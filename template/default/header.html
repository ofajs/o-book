<template page>
  <style>
    :host {
      display: flex;
      align-items: center;
      width: 100%;
      user-select: none;
    }

    .logo-link,
    .logo {
      display: flex;
      align-items: center;
      height: 30px;
      color: inherit;
      text-decoration: none;
    }

    .logo-text {
      font-weight: bold;
      font-size: 18px;
      margin-left: 4px;
    }

    .header-btn-group {
      display: flex;
      align-items: center;
      margin-left: 16px;
    }

    .header-btn-group p-button {
      margin-left: 4px;
    }

    .menu-list {
      display: flex;
      margin-left: auto;
    }

    .menu-item {
      display: flex;
      align-items: center;
      height: 30px;
      margin: 0 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
    }
    .menu-item:hover {
      color: var(--md-sys-color-primary);
    }
  </style>

  <a class="logo-link" href="">
    <img class="logo" src="https://ofajs.com/publics/logo.svg" alt="" />
    <div class="logo-text">ofa.js</div>
  </a>

  <div class="menu-list">
    <div class="menu-item">Item1</div>
    <div class="menu-item">Item2</div>
    <div class="menu-item">Item3</div>
  </div>

  <div class="header-btn-group">
    <p-button variant="text" icon on:click="clickMode">
      <o-if :value="theme === 'dark'">
        <n-icon
          icon="material-symbols:dark-mode"
          style="font-size: 24px"
        ></n-icon>
      </o-if>
      <o-else-if :value="theme === 'light'">
        <n-icon
          icon="material-symbols:light-mode"
          style="font-size: 24px"
        ></n-icon>
      </o-else-if>
      <o-else>
        <n-icon icon="line-md:light-dark" style="font-size: 24px"></n-icon>
      </o-else>
    </p-button>
    <p-button variant="text">
      <n-icon icon="mdi:language" slot="prefix"> </n-icon>
      简体中文
    </p-button>
    <p-button variant="text" icon>
      <n-icon icon="mdi:github" style="font-size: 24px"></n-icon>
    </p-button>
  </div>

  <o-consumer name="pui" watch:theme="theme"></o-consumer>

  <script>
    export default async () => {
      return {
        data: {
          theme: "",
        },
        proto: {
          clickMode() {
            const puiProvider = this.getProvider("pui");
            if (puiProvider.theme === "auto") {
              puiProvider.theme = "dark";
            } else if (puiProvider.theme === "dark") {
              puiProvider.theme = "light";
            } else {
              puiProvider.theme = "auto";
            }
          },
        },
        attached() {},
      };
    };
  </script>
</template>
