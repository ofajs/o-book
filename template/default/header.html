<template page>
  <style>
    :host {
      display: flex;
      align-items: center;
      width: 100%;
      user-select: none;
    }

    .logo-link,
    .logo {
      display: flex;
      align-items: center;
      height: 30px;
      color: inherit;
      text-decoration: none;
    }

    .logo-text {
      font-weight: bold;
      font-size: 18px;
      margin-left: 4px;
    }

    .header-btn-group {
      display: flex;
      align-items: center;
      margin-left: auto;
    }

    .header-btn-group p-button {
      margin-left: 4px;
    }
  </style>

  <a class="logo-link" href="">
    <img class="logo" src="https://ofajs.com/publics/logo.svg" alt="" />
    <div class="logo-text">ofa.js</div>
  </a>
  <div class="header-btn-group">
    <p-button variant="text" icon on:click="clickMode">
      <o-if :value="displayMode === 'dark'">
        <n-icon
          icon="material-symbols:dark-mode"
          style="font-size: 24px"
        ></n-icon>
      </o-if>
      <o-else-if :value="displayMode === 'light'">
        <n-icon
          icon="material-symbols:light-mode"
          style="font-size: 24px"
        ></n-icon>
      </o-else-if>
      <o-else>
        <n-icon icon="line-md:light-dark" style="font-size: 24px"></n-icon>
      </o-else>
    </p-button>
    <p-button variant="text">
      <n-icon icon="mdi:language" slot="prefix"> </n-icon>
      简体中文
    </p-button>
    <p-button variant="text" icon>
      <n-icon icon="mdi:github" style="font-size: 24px"></n-icon>
    </p-button>
  </div>

  <script>
    export default async () => {
      return {
        data: {
          displayMode: localStorage.getItem("displayMode") || "auto", // auto dark light
        },
        watch: {
          displayMode(mode) {
            changeMode(mode);
          },
        },
        proto: {
          clickMode() {
            if (this.displayMode === "auto") {
              this.displayMode = "dark";
            } else if (this.displayMode === "dark") {
              this.displayMode = "light";
            } else {
              this.displayMode = "auto";
            }
          },
        },
      };
    };

    function changeMode(mode) {
      if (mode === "light") {
        $("html").classList.add("theme-light-mode");
        $("html").classList.remove("theme-dark-mode");
        localStorage.setItem("displayMode", "light");
      } else if (mode === "dark") {
        $("html").classList.add("theme-dark-mode");
        $("html").classList.remove("theme-light-mode");
        localStorage.setItem("displayMode", "dark");
      } else {
        $("html").classList.remove("theme-light-mode");
        $("html").classList.remove("theme-dark-mode");
        localStorage.setItem("displayMode", "auto");
      }
    }
  </script>
</template>
