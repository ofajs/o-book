<template page>
  <style>
    :host {
      display: flex;
      align-items: center;
      width: 100%;
      user-select: none;
    }

    .logo-link,
    .logo {
      display: flex;
      align-items: center;
      height: 30px;
      color: inherit;
      text-decoration: none;
    }

    .logo-text {
      font-weight: bold;
      font-size: 18px;
      margin-left: 4px;
    }

    .header-btn-group {
      display: flex;
      align-items: center;
      margin-left: 16px;
    }

    .header-btn-group p-button {
      margin-left: 4px;
    }

    .menu-list {
      display: flex;
      margin-left: auto;
    }

    .menu-item {
      display: flex;
      align-items: center;
      margin-left: 12px;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      border-radius: 20px;
      color: inherit;
      text-decoration: none;
    }
    .menu-item:hover {
      color: var(--md-sys-color-primary);
    }

    .menu-item.active {
      color: var(--md-sys-color-primary);
      background-color: var(--md-sys-color-primary-container);
    }
  </style>

  <a class="logo-link" attr:href="indexUrl" olink>
    <img class="logo" src="https://ofajs.com/publics/logo.svg" alt="" />
    <div class="logo-text">ofa.js</div>
  </a>

  <div class="menu-list">
    <o-fill :value="header">
      <a
        class="menu-item"
        class:active="$data.active"
        attr:href="$data.url"
        olink
      >
        {{$data.name}}
      </a>
    </o-fill>
  </div>

  <div class="header-btn-group">
    <p-button variant="text" icon on:click="clickMode">
      <o-if :value="theme === 'dark'">
        <n-icon
          icon="material-symbols:dark-mode"
          style="font-size: 24px"
        ></n-icon>
      </o-if>
      <o-else-if :value="theme === 'light'">
        <n-icon
          icon="material-symbols:light-mode"
          style="font-size: 24px"
        ></n-icon>
      </o-else-if>
      <o-else>
        <n-icon icon="line-md:light-dark" style="font-size: 24px"></n-icon>
      </o-else>
    </p-button>
    <p-button variant="text">
      <n-icon icon="mdi:language" slot="prefix"> </n-icon>
      简体中文
    </p-button>
    <p-button variant="text" icon>
      <n-icon icon="mdi:github" style="font-size: 24px"></n-icon>
    </p-button>
  </div>

  <o-consumer name="pui" watch:theme="theme"></o-consumer>

  <script>
    export default async ({ load, url: headerUrl }) => {
      const { getCurrentLang } = await load("./js/util.js");

      const lang = getCurrentLang();

      return {
        data: {
          theme: "",
          header: [],
          indexUrl: "",
        },
        proto: {
          clickMode() {
            $("html").css.transition = "all 0.3s ease-in-out";
            clearTimeout(this._timer);
            this._timer = setTimeout(() => {
              $("html").css.transition = "";
            }, 300);
            const puiProvider = this.getProvider("pui");
            if (puiProvider.theme === "auto") {
              puiProvider.theme = "dark";
            } else if (puiProvider.theme === "dark") {
              puiProvider.theme = "light";
            } else {
              puiProvider.theme = "auto";
            }
          },
          async loadHeaders() {
            const { header } = await load(`./${lang}/article-config.json`);

            this.indexUrl = `${headerUrl.replace(/\/header\.html$/, "")}/${lang}/index.html`;

            this.header = header.map((e) => {
              return {
                name: e.name,
                activePrefix: `${headerUrl.replace(/\/header\.html$/, "")}/${lang}/${e.prefix}`, // 导航前缀
                url: `${headerUrl.replace(/\/header\.html$/, "")}/${lang}/${e.firstUrl}`, // 导航链接
              };
            });
          },
          refreshActive() {
            const current = this.app.current;

            // 修复激活态
            this.header.forEach((item) => {
              if (current.src.startsWith(item.activePrefix)) {
                item.active = true;
              } else {
                item.active = false;
              }
            });
          },
        },
        async attached() {
          await this.loadHeaders();
          this.refreshActive();
        },
      };
    };
  </script>
</template>
