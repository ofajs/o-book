<template component>
  <style>
    :host {
      display: block;
    }

    .menu-list {
      display: flex;
      margin-left: auto;
    }

    .menu-item {
      display: flex;
      align-items: center;
      margin-left: 12px;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      border-radius: 20px;
      color: inherit;
      text-decoration: none;
    }
    .menu-item:hover {
      color: var(--md-sys-color-primary);
    }

    .menu-item.active {
      color: var(--md-sys-color-primary);
      background-color: var(--md-sys-color-primary-container);
    }
  </style>

  <div class="menu-list">
    <o-fill :value="header">
      <a
        class="menu-item"
        class:active="$data.active"
        attr:href="$data.url"
        on:click="$host.emit('clicked-item')"
        olink
      >
        {{$data.name}}
      </a>
    </o-fill>
  </div>

  <script>
    export default async ({ load, url: headerMenuUrl }) => {
      const { getCurrentLang } = await load("../js/util.js");
      const lang = getCurrentLang();

      return {
        tag: "header-menu",
        data: {
          header: [],
        },
        proto: {
          async loadHeaders() {
            const { header } = await load(`../${lang}/article-config.json`);
            headerMenuUrl;

            this.header = header.map((e) => {
              return {
                name: e.name,
                activePrefix: `${headerMenuUrl.replace(/\/comps\/header-menu\.html$/, "")}/${lang}/${e.prefix}`, // 导航前缀
                url: `${headerMenuUrl.replace(/\/comps\/header-menu\.html$/, "")}/${lang}/${e.firstUrl}`, // 导航链接
              };
            });
          },
          refreshActive() {
            const current = this.app.current;

            // 修复激活态
            this.header.forEach((item) => {
              if (current.src.startsWith(item.activePrefix)) {
                item.active = true;
              } else {
                item.active = false;
              }
            });
          },
        },
        async attached() {
          await this.loadHeaders();
          this.refreshActive();

          this.app.on(
            "router-change",
            (this._rc_func = () => {
              this.refreshActive();
            }),
          );
        },
        detached() {
          this.app.off("router-change", this._rc_func);
        },
      };
    };
  </script>
</template>
