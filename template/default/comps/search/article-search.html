<template component>
  <l-m src="/nos/locale-text/locale-text.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/dialog/dialog.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/input/input.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/list/list.html"></l-m>
  <style>
    :host {
      display: block;
    }

    .search-container {
      display: flex;
      align-items: center;
      width: 200px;
      height: 32px;
      border-radius: 21px;
      user-select: none;
      /* border: 1px solid var(--md-sys-color-primary); */
      color: var(--md-sys-color-normal);
      background-color: var(--md-sys-color-on-normal);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.1s ease-in-out;
    }

    .search-container:hover {
      box-shadow: 0 0 5px rgba(from var(--md-sys-color-primary) r g b / 0.5);
    }

    .search-btn {
      display: none;
    }

    @media screen and (max-width: 768px) {
      .search-container {
        display: none;
      }
      .search-btn {
        display: block;
      }
    }
  </style>
  <div class="search-container" on:click="showDialog = true">
    <n-icon
      icon="material-symbols:search-rounded"
      style="margin-left: 10px; font-size: 20px; display: block"
    ></n-icon>
    <locale-text style="display: block; margin-left: 8px">
      <span lang="cn"> 搜索 </span>
      <span lang="en"> Search </span>
    </locale-text>
  </div>
  <p-button
    class="search-btn"
    icon
    variant="text"
    on:click="showDialog = true"
    style="margin-left: 8px"
  >
    <n-icon
      icon="material-symbols:search-rounded"
      style="font-size: 22px"
    ></n-icon>
  </p-button>

  <style>
    .dialog-container {
      width: 80vw;
      max-width: 600px;
      height: 80vh;
    }

    @media screen and (max-width: 540px) {
      .dialog-container {
        width: 100%;
      }
    }
    h5 {
      display: flex;
      align-items: center;
      n-icon {
        margin-right: 8px;
      }
    }
    p-list-item[button] {
      border-radius: 20px;

      n-icon {
        margin-right: 8px;
      }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border-top: 2px solid var(--md-sys-color-primary, #3498db);
      border-radius: 50%;
      animation: spin 0.5s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .hide {
      display: none !important;
    }
  </style>

  <p-dialog :open="showDialog" on:click-mask="showDialog = false">
    <div class="dialog-container">
      <p-input
        placeholder="Search docs"
        sync:value="searchValue"
        on:input="changeSearch"
        autofocus
      >
        <n-icon
          icon="material-symbols:search-rounded"
          style="font-size: 22px"
          slot="prefix"
          class:hide="loading"
        ></n-icon>
        <div
          slot="prefix"
          class:hide="!loading"
          style="
            display: flex;
            width: 22px;
            align-items: center;
            justify-content: center;
          "
        >
          <div class="spinner"></div>
        </div>
      </p-input>
      <div>
        <o-if :value="!list.length && loading">
          <div
            style="
              display: flex;
              justify-content: center;
              align-items: center;
              height: 200px;
            "
          >
            <div class="spinner"></div>
          </div>
        </o-if>
        <o-else-if :value="!list.length && !loading && searchValue">
          <div
            style="
              display: flex;
              justify-content: center;
              align-items: center;
              height: 200px;
            "
          >
            <locale-text>
              <span lang="cn"> 暂无搜索结果 </span>
              <span lang="en"> No search results </span>
            </locale-text>
          </div>
        </o-else-if>
        <o-fill :value="list">
          <div>
            <h5 style="font-size: 14px; padding: 16px 0 8px; margin: 0">
              <n-icon icon="material-symbols:article-outline"></n-icon>
              {{ $data.title }}
            </h5>
            <p-list>
              <o-fill :value="$data.result">
                <p-list-item button on:click="$host.clickItem($data,$index)">
                  <o-if :value="$data.tag === 'blockquote'" slot="prefix">
                    <div
                      style="
                        margin-right: 8px;
                        font-weight: bold;
                        text-align: center;
                      "
                    >
                      <n-icon icon="tabler:blockquote"></n-icon>
                    </div>
                  </o-if>
                  <o-else slot="prefix">
                    <div
                      style="
                        margin-right: 8px;
                        font-weight: bold;
                        text-align: center;
                      "
                    >
                      {{ $data.tag }}
                    </div>
                  </o-else>
                  <div>{{ $data.aroundText }}</div>
                </p-list-item>
              </o-fill>
            </p-list>
          </div>
        </o-fill>
      </div>
    </div>
  </p-dialog>
  <script>
    export default async ({ load, url: searchUrl }) => {
      const { getCurrentLang } = await load("../../js/util.js");
      const lang = getCurrentLang();

      return {
        tag: "article-search",
        data: {
          showDialog: false,
          list: [],
          historyList: [],
          searchValue: "",
          loading: false,
        },
        proto: {
          clickItem(item, index) {
            const prefixUrl = this.app.current.src.split(`/${lang}/`)[0];
            const url = `${prefixUrl}/${lang}/${item.url}?index=${item.lineIndex}&search=${this.searchValue}`;
            this.app.goto(url);
            this.showDialog = false;
          },
          changeSearch() {
            this.loading = true;
            clearTimeout(this._search_timer);
            this._search_timer = setTimeout(async () => {
              // 获取db文件
              const val = this.searchValue.trim();

              if (!val) {
                this.list = [];
                this.loading = false;
                return;
              }
              const currentPageSrc = this.app.current.src;
              const prefixUrl = currentPageSrc.split(`/${lang}/`)[0];
              const dbUrl = `${prefixUrl}/${lang}/db.json`;
              const jsonData = await fetch(dbUrl).then((res) => res.json());

              const list = [];

              for (let pageItem of jsonData) {
                const result = [];

                // 逐行进行查找
                let lineIndex = 0;
                for (let line of pageItem.content) {
                  lineIndex++;
                  if (line.c.toLowerCase().includes(val.toLowerCase())) {
                    // 获取那个附近的文本
                    const startIndex = line.c
                      .toLowerCase()
                      .indexOf(val.toLowerCase());
                    const endIndex = startIndex + val.length;

                    let aroundText = line.c.slice(
                      endIndex - 20 < 0 ? 0 : endIndex - 20,
                      endIndex + 20,
                    );

                    if (endIndex - 20 > 0) {
                      aroundText = "..." + aroundText;
                    }
                    if (endIndex + 20 < line.length) {
                      aroundText += "...";
                    }

                    result.push({
                      tag: line.t,
                      url: pageItem.url,
                      lineIndex,
                      aroundText,
                    });
                  }
                }

                if (result.length) {
                  list.push({
                    title: pageItem.title,
                    url: pageItem.url,
                    result,
                  });
                }
              }

              this.loading = false;

              console.log(list);
              this.list = list;
            }, 300);
          },
          init() {
            // const workerUrl = new URL("./search-worker.js", searchUrl);
            // const worker = new Worker(workerUrl, {
            //   type: "module",
            // });
            // worker.postMessage({
            //   type: "init",
            // });
            // worker.onmessage = (e) => {
            //   console.log(e);
            // };
          },
        },
        attached() {
          this.init();
        },
      };
    };
  </script>
</template>
