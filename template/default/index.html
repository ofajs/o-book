<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.19/dist/ofa.mjs#debug"
      type="module"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.19/libs/scsr/dist/scsr.min.mjs"
      type="module"
    ></script>

    <link rel="icon" href="https://ofajs.com/publics/logo.svg" />
    <link rel="stylesheet" href="{pathPrefix}/css/palette.css" pui-colors />
    <link rel="stylesheet" href="{pathPrefix}/css/theme.css" />
    <link rel="stylesheet" href="{pathPrefix}/css/github-markdown.css" />
    <link rel="stylesheet" href="{pathPrefix}/css/hljs.css" />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Microsoft Yahei,
          Helvetica,
          Arial,
          sans-serif,
          Apple Color Emoji,
          Segoe UI Emoji;
      }

      o-app {
        height: 100%;
      }

      @keyframes fadein {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      o-app {
        animation: fadein 0.1s ease-in-out;
      }
    </style>
  </head>
  <body>
    <o-app src="{pathPrefix}/js/app-config.js">
      <template page>
        <link rel="stylesheet" href="{pathPrefix}/css/github-markdown.css" />
        <link rel="stylesheet" href="{pathPrefix}/css/hljs.css" />
        <l-m src="{pathPrefix}/comps/center-block.html"></l-m>
        <l-m src="{pathPrefix}/comps/article-code.html"></l-m>
        <l-m
          src="https://playground.ofajs.com/comps/o-playground/o-playground.html"
        ></l-m>
        <style>
          :host {
            display: block;
            height: 100%;
            box-sizing: border-box;
            overflow: auto;
          }
        </style>
        <link rel="stylesheet" href="{pathPrefix}/css/page.css" />
        <!-- main content -->
        <div class="footer"></div>

        <script>
          export const parent = "{pathPrefix}/layout.html";

          export default async ({ load, query }) => {
            const { init, revoke } = await load("{pathPrefix}/js/init.js");

            return {
              data: {},
              attached() {
                init(this, query);
                setTimeout(() => {
                  this.style.transform = "";
                }, 300);
              },
              detached() {
                revoke(this);
              },
            };
          };
        </script>
      </template>
    </o-app>
    <o-root-provider name="pui" theme="dark"></o-root-provider>
  </body>
</html>
