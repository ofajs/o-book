<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.17/dist/ofa.mjs#debug"
      type="module"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.17/libs/scsr/dist/scsr.min.mjs"
      type="module"
    ></script>
    <link rel="icon" href="https://ofajs.com/publics/logo.svg" />
    <link rel="stylesheet" href="{pathPrefix}/css/palette.css" pui-colors />
    <link rel="stylesheet" href="{pathPrefix}/css/theme.css" />
    <link rel="stylesheet" href="{pathPrefix}/css/github-markdown.css" />
    <link rel="stylesheet" href="{pathPrefix}/css/hljs.css" />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Microsoft Yahei,
          Helvetica,
          Arial,
          sans-serif,
          Apple Color Emoji,
          Segoe UI Emoji;
      }

      o-app {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <o-app src="{pathPrefix}/js/app-config.js">
      <template page>
        <link rel="stylesheet" href="{pathPrefix}/css/github-markdown.css" />
        <link rel="stylesheet" href="{pathPrefix}/css/hljs.css" />
        <l-m src="{pathPrefix}/comps/center-block.html"></l-m>
        <l-m src="{pathPrefix}/comps/article-code.html"></l-m>
        <style>
          :host {
            display: block;
            padding: 0 16px;
            height: 100%;
            box-sizing: border-box;
            overflow: auto;
          }

          article,
          article.markdown-body {
            max-width: var(--max-container-width, 1200px);
            margin: 0 auto;
          }
          .footer {
            display: flex;
            max-width: var(--max-container-width, 1200px);
            margin: 0 auto;
            height: 40px;
            padding-bottom: 40px;
          }

          .next-item {
            margin-left: auto;
          }
          .prev-item,
          .next-item {
            display: flex;
            align-items: center;
            color: inherit;
            text-decoration: none;
          }
        </style>
        <!-- main content -->
        <div class="footer"></div>

        <script>
          export const parent = "{pathPrefix}/layout.html";

          export default async ({ load }) => {
            const { init, revoke } = await load("{pathPrefix}/js/init.js");

            return {
              data: {},
              attached() {
                init(this);
              },
              detached() {
                revoke(this);
              },
            };
          };
        </script>
      </template>
    </o-app>
    <o-root-provider name="pui" theme="dark"></o-root-provider>
  </body>
</html>
