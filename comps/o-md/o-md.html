<template component>
  <style>
    :host {
      display: block;
    }
  </style>

  <div :html="htmlContent"></div>

  <script>
    import { marked } from "https://cdn.jsdelivr.net/npm/marked@17.0.1/lib/marked.esm.js";

    export default async () => ({
      tag: "o-md",
      attrs: {
        src: null,
      },
      data: {
        htmlContent: "",
      },
      watch: {
        src(newVal) {
          if (newVal) {
            this.loadMarkdown();
          }
        },
      },
      ready() {
        if (this.src) {
          this.loadMarkdown();
        }
      },
      proto: {
        async loadMarkdown() {
          try {
            const response = await fetch(this.src);
            if (!response.ok) {
              throw new Error(`Failed to load ${this.src}`);
            }
            const markdownText = await response.text();
            this.htmlContent = await marked.parse(markdownText);
          } catch (error) {
            console.error("Error loading markdown:", error);
            this.htmlContent = `<p style="color: red;">Error loading markdown file: ${error.message}</p>`;
          }
        },
      },
    });
  </script>
</template>
