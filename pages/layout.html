<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/navigation/nav-layout.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/navigation/nav-bar.html"></l-m>
  <l-m src="/nos/locale-text/locale-text.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>
  <style>
    :host {
      display: block;
    }
  </style>

  <o-provider name="project-data" :project-path="query.path">
    <p-nav-layout>
      <p-nav-bar slot="nav">
        <o-if :value="activeId === 'start'">
          <p-nav-item attr:active-item="activeId === 'start'">
            <locale-text>
              <span lang="cn">开始</span>
              <span lang="en">Start</span>
            </locale-text>
            <n-icon icon="material-symbols:start-rounded" slot="icon"></n-icon>
          </p-nav-item>
        </o-if>
        <o-if :value="activeId !== 'start'">
          <p-nav-item
            attr:active-item="activeId === 'dashboard'"
            on:click="goto('./dashboard/dashboard.html?path='+query.path)"
          >
            <locale-text>
              <span lang="cn">总揽</span>
              <span lang="en">Dashboard</span>
            </locale-text>
            <n-icon
              icon="material-symbols:dashboard-outline-rounded"
              slot="icon"
            ></n-icon>
          </p-nav-item>
        </o-if>
        <o-if :value="activeId !== 'start'">
          <p-nav-item
            attr:active-item="activeId === 'translate'"
            on:click="goto('./translate/translate.html?path='+query.path)"
          >
            <locale-text>
              <span lang="cn">AI翻译</span>
              <span lang="en">AI Translate</span>
            </locale-text>
            <n-icon icon="mingcute:ai-line" slot="icon"></n-icon>
          </p-nav-item>
        </o-if>
        <o-if :value="activeId !== 'start'">
          <p-nav-item
            attr:active-item="activeId === 'config'"
            on:click="goto('./config/config.html?path='+query.path)"
          >
            <locale-text>
              <span lang="cn">配置</span>
              <span lang="en">Settings</span>
            </locale-text>
            <n-icon
              icon="material-symbols:settings-outline-rounded"
              slot="icon"
            ></n-icon>
          </p-nav-item>
        </o-if>
      </p-nav-bar>
      <div style="position: relative; height: 100%">
        <slot></slot>
      </div>
    </p-nav-layout>
  </o-provider>
  <script>
    export default async ({ load }) => {
      const { get } = await load("/nos/fs/handle/mount/mount.js");
      const { getData } = await load("../util/yaml-handle.js");

      return {
        data: {
          activeId: "",
          query: {
            path: "",
          },
        },
        ready() {
          this.on("set-active-id", async (e) => {
            const { name, query } = e.data;
            this.activeId = name;
            if (query && query.path) {
              this.query = query;

              const _topHandle = await get(query.path);
              const data = await getData(_topHandle);

              const title = `OBook - ${data.name}`;

              if ($("title").text !== title) {
                $("title").text = title;
              }
            }
          });
        },
      };
    };
  </script>
</template>
