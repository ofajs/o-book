<template page>
  <style>
    :host {
      display: block;
    }
  </style>
  <script>
    export const parent = "./layout.html";

    export default async ({ load, query }) => {
      const { get } = await load("/nos/fs/handle/mount/mount.js");
      const { getData } = await load("../util/yaml-handle.js");

      return {
        data: {},
        proto: {
          async init() {
            const handle = await get(query.path);

            // 读取配置文件
            const config = await getData(handle);
            const mainLang = config.mainLang || "en";

            // 读取主语言文件
            const mainLangConfig = await getData(
              handle,
              `${mainLang}/_config.yaml`,
            );

            debugger;
          },
        },
        attached() {
          this.emit("set-active-id", {
            composed: true,
            data: {
              name: "dashboard",
            },
          });

          this.init();
        },
      };
    };
  </script>
</template>
