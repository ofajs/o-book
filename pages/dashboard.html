<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/list/list.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/button/button.html"></l-m>
  <style>
    :host {
      display: block;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 16px;
    }

    .list-content {
      width: 240px;
      padding: 4px;
    }

    p-list-item {
      border-radius: 8px;
      margin: 2px 0;
    }

    h2 {
      font-size: 14px;
      padding: 8px 0;
      margin: 0;
      color: var(--md-ref-palette-normal40);
    }

    .hide {
      display: none !important;
    }
  </style>
  <div class="container">
    <div style="width: 100%; display: flex">
      <p-button on:click="clickPreview"> 预览网页 </p-button>
      <p-button
        on:click="refreshPreview"
        variant="outlined"
        style="margin-left: 8px"
      >
        <n-icon icon="material-symbols:refresh" slot="prefix"></n-icon>
        完全刷新
      </p-button>
    </div>
    <div class="list-content">
      <h2>顶部导航</h2>
      <p-list>
        <o-fill :value="header">
          <p-list-item
            button
            on:click="$host.clickHeaderItem($data.url)"
            attr:active-item="$host.activeHeader === $data.url"
          >
            {{$data.name}}
            <!-- <div secondary>{{$data.url}}</div> -->
          </p-list-item>
        </o-fill>
      </p-list>
    </div>
    <div class="list-content">
      <h2>导航对应列表</h2>
      <p-list>
        <o-fill :value="documentList" name="document-item"> </o-fill>
      </p-list>
    </div>

    <style>
      .article-item {
        color: var(--md-sys-color-primary);
      }

      n-icon[slot="prefix"] {
        margin-right: 4px;
        font-size: 16px;
      }
    </style>

    <template name="document-item">
      <p-list-item collapse-childs="open" attr:button="$data.url">
        <n-icon
          class="article-item"
          class:hide="!$data.url"
          icon="material-symbols:article-outline"
          slot="prefix"
        ></n-icon>
        <x-if :value="$data.content && $data.content.length > 0">
          <i toggle-collapse triangle slot="suffix" style="z-index: 3"></i>
        </x-if>
        {{$data.name}}
        <p-list slot="childs">
          <o-fill :value="$data.content" name="document-item"></o-fill>
        </p-list>
      </p-list-item>
    </template>
  </div>
  <script>
    export const parent = "./layout.html";

    export default async ({ load, query }) => {
      const { get } = await load("/nos/fs/handle/mount/mount.js");
      const { getData } = await load("../util/yaml-handle.js");
      const { initGenerator, getRootUrl } = await load("../util/genarate.js");

      return {
        data: {
          header: [], // 导航内容
          documentList: [], // 目标导航下的文档列表
          activeHeader: "",
          _topHandle: null, // 顶部目录句柄
          _documentHandle: null, // 主语言文档所在的目录句柄
        },
        proto: {
          clickPreview() {
            window.open(`/${query.path}/website/index.html`, "_blank");
          },
          async refreshPreview() {
            // 从模板复制文件到
            debugger;
          },
          async clickHeaderItem(url) {
            this.activeHeader = url;
            const targetItem = this.header.find((item) => item.url === url);

            const documentList = await getData(
              this._documentHandle,
              `${targetItem.url}`,
            );

            if (Array.isArray(documentList)) {
              console.log(documentList);
              this.documentList = documentList;
            } else {
              this.documentList = [];
              debugger;
            }
          },
          async init() {
            const handle = await get(query.path);

            this._topHandle = handle;

            // 读取配置文件
            const config = await getData(handle);
            const writingLang = config.writingLang || "en";

            // 读取主语言文件
            const writingLangConfig = await getData(
              handle,
              `${writingLang}/_config.yaml`,
            );

            this._documentHandle = await handle.get(writingLang);

            this.header = writingLangConfig.header || [];

            this.clickHeaderItem(this.header[0].url);

            initGenerator({
              websiteConfig: config,
              topHandle: this._topHandle,
              articleHandle: this._documentHandle,
              websiteHandle: await this._topHandle.get("website", {
                create: "dir",
              }),
            });
          },
        },
        attached() {
          this.emit("set-active-id", {
            composed: true,
            data: {
              name: "dashboard",
            },
          });

          this.init();
        },
      };
    };
  </script>
</template>
