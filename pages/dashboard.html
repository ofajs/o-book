<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/list/list.html"></l-m>
  <style>
    :host {
      display: block;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 16px;
    }

    .list-content {
      width: 240px;
      padding: 4px;
    }

    p-list-item {
      border-radius: 20px;
    }

    h2 {
      font-size: 14px;
      padding: 8px 0;
      margin: 0;
      color: var(--md-ref-palette-normal40);
    }
  </style>
  <div class="container">
    <div class="list-content">
      <h2>导航内容</h2>
      <p-list>
        <o-fill :value="header">
          <p-list-item
            button
            on:click="$host.clickHeaderItem($data.url)"
            attr:active-item="$host.activeHeader === $data.url"
          >
            {{$data.name}}
            <!-- <div secondary>{{$data.url}}</div> -->
          </p-list-item>
        </o-fill>
      </p-list>
    </div>
    <div class="list-content">
      <h2>列表内容</h2>
      <p-list>
        <o-fill :value="documentList" name="document-item"> </o-fill>
      </p-list>
    </div>

    <template name="document-item">
      <p-list-item>
        <o-if :value="$data.url" slot="prefix">
          <n-icon icon="material-symbols:article-outline"></n-icon>
        </o-if>
        {{$data.name}}
        <p-list slot="childs">
          <o-fill :value="$data.content" name="document-item"></o-fill>
        </p-list>
      </p-list-item>
    </template>
  </div>
  <script>
    export const parent = "./layout.html";

    export default async ({ load, query }) => {
      const { get } = await load("/nos/fs/handle/mount/mount.js");
      const { getData } = await load("../util/yaml-handle.js");

      return {
        data: {
          header: [], // 导航内容
          documentList: [], // 目标导航下的文档列表
          activeHeader: "",
        },
        proto: {
          async clickHeaderItem(url) {
            this.activeHeader = url;
            const targetItem = this.header.find((item) => item.url === url);

            const documentList = await getData(
              this._documentHandle,
              `${targetItem.url}`,
            );

            if (Array.isArray(documentList)) {
              console.log(documentList);
              this.documentList = documentList;
            } else {
              this.documentList = [];
              debugger;
            }
          },
          async init() {
            const handle = await get(query.path);

            // 读取配置文件
            const config = await getData(handle);
            const mainLang = config.mainLang || "en";

            // 读取主语言文件
            const mainLangConfig = await getData(
              handle,
              `${mainLang}/_config.yaml`,
            );

            this._documentHandle = await handle.get(mainLang);

            this.header = mainLangConfig.header || [];
          },
        },
        attached() {
          this.emit("set-active-id", {
            composed: true,
            data: {
              name: "dashboard",
            },
          });

          this.init();
        },
      };
    };
  </script>
</template>
