<template page>
  <style>
    :host {
      display: block;
    }
    .contianer {
      padding: 16px;
    }
  </style>
  <div class="contianer">
    <div>写作语言: <span>{{config.writingLang}}</span></div>
    <p>{{config}}</p>
  </div>
  <script>
    export const parent = "./layout.html";

    export default async ({ load, query }) => {
      const { get } = await load("/nos/fs/main.js");
      const { getData } = await load("../util/yaml-handle.js");

      return {
        data: {
          activeId: "AI",
          config: {
            writingLang: "cn",
            languages: ["cn", "en"],
          },
        },
        proto: {
          // 读取文章数据
          async loadArticle() {
            const handle = await get(query.path);

            this.config = await getData(handle);

            const data = await getArticleData(
              await handle.get(this.config.writingLang),
            );
          },
        },
        attached() {
          this.loadArticle();

          this.emit("set-active-id", {
            composed: true,
            data: {
              name: "translate",
              query: { ...query },
            },
          });
        },
      };
    };

    // 获取每个段落的数据
    const getArticleData = async (handle) => {
      if (handle.kind === "dir") {
        const data = [];
        for await (const item of handle.values()) {
          data.push(await getArticleData(item));
        }
        return data;
      }

      if (handle.name.endsWith(".md")) {
        const content = await handle.text();
        const blocks = await getBlockWithMD(content);

        return {
          path: handle.path,
          blocks,
        };
      }

      if (handle.name.endsWith(".html")) {
        debugger;
        return;
      }

      {
        // 其他文件类型
        debugger;
      }
    };

    const getBlockWithMD = async (content) => {
      const blocks = content.split("\n\n");
      debugger;
      return blocks;
    };
  </script>
</template>
