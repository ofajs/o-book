<template page>
  <style>
    :host {
      display: block;
    }
    .container {
      padding: 16px;
    }
  </style>
  <div class="container">
    <div>写作语言: <span>{{config.writingLang}}</span></div>
    <p>{{config}}</p>
  </div>
  <script>
    export const parent = "./layout.html";

    import { marked } from "/npm/marked@17.0.1/lib/marked.esm.js";

    export default async ({ load, query }) => {
      const { get } = await load("/nos/fs/main.js");
      const { getData } = await load("../util/yaml-handle.js");

      return {
        data: {
          activeId: "AI",
          config: {
            writingLang: "cn",
            languages: ["cn", "en"],
          },
          articleData: [],
        },
        proto: {
          // 读取文章数据
          async loadArticle() {
            const handle = await get(query.path);

            this.config = await getData(handle);

            const data = await getArticleData(
              await handle.get(this.config.writingLang),
              {
                isRoot: true,
              },
            );

            debugger;

            this.articleData = data;
          },
        },
        attached() {
          this.loadArticle();

          this.emit("set-active-id", {
            composed: true,
            data: {
              name: "translate",
              query: { ...query },
            },
          });
        },
      };
    };

    // 获取每个段落的数据
    const getArticleData = async (handle, opts) => {
      let reOpts = {};
      if (opts.isRoot) {
        reOpts.rootPath = handle.path;
      }

      if (handle.kind === "dir") {
        const data = [];
        for await (const item of handle.values()) {
          const dd = await getArticleData(item, reOpts);
          dd && data.push(dd);
        }

        if (opts.isRoot) {
          return data;
        }

        return {
          name: handle.name,
          path: handle.path.replace(opts.rootPath + "/", ""),
          realPath: handle.path,
          isDir: true,
          data,
        };
      }

      const content = await handle.text();

      if (handle.name.endsWith(".md")) {
        const blocks = marked.lexer(content);

        return {
          name: handle.name,
          path: handle.path.replace(opts.rootPath + "/", ""),
          realPath: handle.path,
          blocks,
        };
      }

      if (handle.name.endsWith(".html")) {
        return {
          name: handle.name,
          path: handle.path.replace(opts.rootPath + "/", ""),
          realPath: handle.path,
          content,
        };
      }
    };
  </script>
</template>
