<template component>
  <l-m src="/gh/ofajs/Punch-UI/packages/dialog/dialog.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/button/button.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/input/input.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/select/select.html"></l-m>
  <style>
    .init-dialog {
      width: 400px;
      max-width: 90vw;
    }

    .init-form {
      padding: 16px 0;
    }

    .form-item {
      margin-bottom: 16px;
    }

    .form-item label {
      display: block;
      font-size: 12px;
      color: var(--md-sys-color-normal);
      margin-bottom: 4px;
    }

    .form-item p-select {
      width: 100%;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 16px;
    }

    .hint-text {
      font-size: 12px;
      color: var(--md-sys-color-normal);
      margin-top: 8px;
    }
  </style>

  <p-dialog :open="open" on:click-mask="handleClose">
    <div class="init-dialog">
      <h3 style="margin: 0 0 8px; font-size: 16px">初始化项目</h3>
      <p
        style="
          color: var(--md-sys-color-normal);
          font-size: 14px;
          margin-bottom: 16px;
        "
      >
        当前目录为空或结构不正确，将为您创建基础项目结构。
      </p>
      <div class="init-form">
        <div class="form-item">
          <label>项目名称</label>
          <p-input
            sync:value="projectName"
            placeholder="请输入项目名称"
          ></p-input>
        </div>
        <div class="form-item">
          <label>创作语言</label>
          <p-select sync:value="writingLang">
            <x-fill :value="languageOptions">
              <p-option attr:value="$data.value">{{$data.label}}</p-option>
            </x-fill>
          </p-select>
          <p class="hint-text">创作语言是您撰写文档的主要语言</p>
        </div>
      </div>
      <div class="dialog-actions">
        <p-button variant="outlined" on:click="handleClose">取消</p-button>
        <p-button on:click="handleInit" attr:disabled="initializing">
          {{initializing ? '初始化中...' : '确认初始化'}}
        </p-button>
      </div>
    </div>
  </p-dialog>

  <script>
    const INIT_FILES_CACHE = {};

    const getInitFiles = async (lang, load) => {
      if (INIT_FILES_CACHE[lang]) {
        return INIT_FILES_CACHE[lang];
      }

      try {
        const module = await load(`./init-files/${lang}.js`);
        INIT_FILES_CACHE[lang] = module.default;
        return module.default;
      } catch (error) {
        const module = await load("./init-files/en.js");
        INIT_FILES_CACHE[lang] = module.default;
        return module.default;
      }
    };

    export default async ({ load }) => {
      const { toast } = await load("/gh/ofajs/Punch-UI/packages/util.js");
      const { LANGUAGES } = await load("../translate/util/translate.js");

      return {
        data: {
          open: false,
          writingLang: "cn",
          projectName: "Documentation",
          initializing: false,
          _handle: null,
          languageOptions: Object.entries(LANGUAGES).map(([value, label]) => ({
            value,
            label,
          })),
        },
        watch: {
          open(val) {
            if (val) {
              this.initializing = false;
            }
          },
        },
        proto: {
          handleClose() {
            this.open = false;
          },
          async handleInit() {
            if (this.initializing) return;

            this.initializing = true;

            try {
              await this.initProject(
                this._handle,
                this.writingLang,
                this.projectName,
              );

              toast({
                color: "success",
                message: "项目初始化成功",
              });

              this.open = false;

              this.emit("init-success", {
                data: {
                  handle: this._handle,
                },
                bubbles: true,
                composed: true,
              });
            } catch (error) {
              toast({
                color: "error",
                message: "初始化失败: " + error.message,
              });
            } finally {
              this.initializing = false;
            }
          },
          async initProject(handle, writingLang, projectName) {
            const INIT_FILES = await getInitFiles(writingLang, load);

            for (const [filePath, contentValue] of Object.entries(INIT_FILES)) {
              const resolvedPath = filePath.replace("{lang}", writingLang);
              const pathParts = resolvedPath.split("/");
              let currentHandle = handle;

              for (let i = 0; i < pathParts.length - 1; i++) {
                currentHandle = await currentHandle.get(pathParts[i], {
                  create: "dir",
                });
              }

              const fileName = pathParts[pathParts.length - 1];
              const fileHandle = await currentHandle.get(fileName, {
                create: "file",
              });
              const content =
                typeof contentValue === "function"
                  ? contentValue(projectName, writingLang)
                  : contentValue;
              await fileHandle.write(content);
            }
          },
        },
      };
    };
  </script>
</template>
