<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/button/button.html"></l-m>
  <style>
    :host {
      display: block;
    }

    .rotate-anime {
      animation: rotate 1s linear infinite;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .toolbar {
      width: 100%;
      display: flex;
      align-items: center;
    }

    .toolbar-btn {
      margin-left: 8px;
    }

    .toolbar-label {
      color: var(--md-sys-color-normal);
      font-size: 13px;
      margin-left: 8px;
    }
  </style>
  <div class="toolbar">
    <p-button on:click="clickPreview"> 预览网页 </p-button>
    <p-button
      class="toolbar-btn"
      on:click="refreshPreview"
      variant="outlined"
      attr:disabled="refreshing"
    >
      <n-icon
        class="rotate-anime"
        class:rotate-anime="refreshing"
        icon="material-symbols:refresh"
        slot="prefix"
      ></n-icon>
      重新生成
    </p-button>
    <p-button
      class="toolbar-btn"
      on:click="openConfigDialog"
      variant="outlined"
    >
      <n-icon icon="material-symbols:settings" slot="prefix"></n-icon>
      项目配置
    </p-button>
  </div>

  <o-page :project-path="projectPath" src="./article-list.html"></o-page>

  <o-page
    src="./project-config-dialog.html"
    sync:open="showConfigDialog"
    :project-path="projectPath"
    on:config-saved="onConfigSaved"
  ></o-page>

  <script>
    export const parent = "../layout.html";

    import { buildIndexPreviewUrl } from "./dashboard-data.js";

    export default async ({ load, query }) => {
      const { get } = await load("/nos/fs/handle/mount/mount.js");
      const { getData } = await load("../../util/yaml-handle.js");
      const { initGenerator } = await load("./generate.js");
      const { toast } = await load("/gh/ofajs/Punch-UI/packages/util.js");

      return {
        data: {
          refreshing: false,
          _projectConfig: null,
          showConfigDialog: false,
          projectPath: query.path,
        },
        proto: {
          clickPreview() {
            window.open(buildIndexPreviewUrl(query.path), "_blank");
          },
          async refreshPreview() {
            await this.init({ watchArticle: false });

            toast({
              color: "success",
              message: "重新生成完毕",
            });
          },
          async init({ watchArticle = true }) {
            this.refreshing = true;

            const config = await getData(this._topHandle);
            this._projectConfig = config;

            const writingLang = config.writingLang || "en";

            this._cancels = await initGenerator({
              topHandle: this._topHandle,
              websiteHandle: await this._topHandle.get("website", {
                create: "dir",
              }),
              watchArticle,
              lang: writingLang,
            });

            this.refreshing = false;
          },
          openConfigDialog() {
            this.showConfigDialog = true;
          },
          onConfigSaved() {
            console.log("config-saved");
            this.init({ watchArticle: false });
          },
        },
        async attached() {
          this._topHandle = await get(query.path);

          this.emit("set-active-id", {
            composed: true,
            data: {
              name: "dashboard",
              query: { ...query },
            },
          });

          this.init({ watchArticle: true });
        },
        detached() {
          this._cancels?.forEach((cancel) => cancel());
        },
      };
    };
  </script>
</template>
