<template page>
  <l-m src="/nos/locale-text/locale-text.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI@1/packages/dialog/dialog.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI@1/packages/input/input.html"></l-m>
  <style>
    .analytics-dialog {
      width: 500px;
      max-width: 90vw;
    }

    .analytics-form {
      padding: 16px 0;
    }

    .form-item {
      margin-bottom: 16px;
    }

    .form-item label {
      display: block;
      font-size: 12px;
      color: var(--md-ref-palette-normal40);
      margin-bottom: 4px;
    }

    .form-item p-input {
      width: 100%;
    }

    .form-item .hint {
      font-size: 12px;
      color: var(--md-ref-palette-normal40);
      margin-top: 4px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 16px;
    }
  </style>

  <p-dialog :open="open" on:click-mask="handleClose">
    <div class="analytics-dialog">
      <h3 style="margin: 0 0 8px; font-size: 16px">
        <locale-text>
          <span lang="cn">谷歌统计设置</span>
          <span lang="en">Google Analytics Settings</span>
        </locale-text>
      </h3>
      <div class="analytics-form">
        <div class="form-item">
          <label>
            <locale-text>
              <span lang="cn">Google Analytics 统计代码</span>
              <span lang="en">Google Analytics Code</span>
            </locale-text>
          </label>
          <p-input
            sync:value="googleAnalytics"
            attr:placeholder="gaPlaceholder"
            multiline
            rows="5"
          ></p-input>
          <div class="hint">
            <locale-text>
              <span lang="cn">请粘贴完整的 Google Analytics 脚本代码，例如：&lt;script&gt;...&lt;/script&gt;</span>
              <span lang="en">Paste the complete Google Analytics script code, e.g.: &lt;script&gt;...&lt;/script&gt;</span>
            </locale-text>
          </div>
        </div>
      </div>
      <div class="dialog-actions">
        <p-button variant="outlined" on:click="handleClose">
          <locale-text>
            <span lang="cn">取消</span>
            <span lang="en">Cancel</span>
          </locale-text>
        </p-button>
        <p-button on:click="handleSave">
          <locale-text>
            <span lang="cn">保存</span>
            <span lang="en">Save</span>
          </locale-text>
        </p-button>
      </div>
    </div>
  </p-dialog>

  <script>
    import yaml from "/npm/js-yaml@4.1.1/dist/js-yaml.min.mjs";
    import { getLocaleText } from "/nos/locale-text/get-locale-text.js";

    export default async ({ load }) => {
      const { getData } = await load("../../util/yaml-handle.js");
      const { toast } = await load("/gh/ofajs/Punch-UI@1/packages/util.js");
      const { get } = await load("/nos/fs/handle/mount/mount.js");

      return {
        data: {
          open: false,
          googleAnalytics: "",
          _topHandle: null,
          _projectConfig: null,
          projectPath: "",
        },
        watch: {
          async open(val) {
            if (val && this.projectPath) {
              this._topHandle = await get(this.projectPath);
              this._projectConfig = await getData(this._topHandle);
              this.googleAnalytics = this._projectConfig.googleAnalytics || "";
            }
          },
        },
        proto: {
          get gaPlaceholder() {
            return getLocaleText({
              cn: "请输入 Google Analytics 统计代码",
              en: "Enter Google Analytics code",
            });
          },
          handleClose() {
            this.open = false;
          },
          async handleSave() {
            try {
              this._projectConfig.googleAnalytics = this.googleAnalytics;

              const configHandle = await this._topHandle.get("_config.yaml");
              const configText = yaml.dump(this._projectConfig);
              await configHandle.write(configText);

              this.open = false;

              toast({
                color: "success",
                message: getLocaleText({
                  cn: "谷歌统计设置保存成功",
                  en: "Google Analytics settings saved successfully",
                }),
              });

              this.emit("analytics-saved", {
                bubbles: true,
                composed: true,
              });
            } catch (error) {
              toast({
                color: "error",
                message: getLocaleText({
                  cn: "保存失败: " + error.message,
                  en: "Failed to save: " + error.message,
                }),
              });
            }
          },
        },
      };
    };
  </script>
</template>
