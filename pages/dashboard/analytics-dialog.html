<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/dialog/dialog.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/input/input.html"></l-m>
  <style>
    .analytics-dialog {
      width: 500px;
      max-width: 90vw;
    }

    .analytics-form {
      padding: 16px 0;
    }

    .form-item {
      margin-bottom: 16px;
    }

    .form-item label {
      display: block;
      font-size: 12px;
      color: var(--md-ref-palette-normal40);
      margin-bottom: 4px;
    }

    .form-item p-input {
      width: 100%;
    }

    .form-item .hint {
      font-size: 12px;
      color: var(--md-ref-palette-normal40);
      margin-top: 4px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 16px;
    }
  </style>

  <p-dialog :open="open" on:click-mask="handleClose">
    <div class="analytics-dialog">
      <h3 style="margin: 0 0 8px; font-size: 16px">谷歌统计设置</h3>
      <div class="analytics-form">
        <div class="form-item">
          <label>Google Analytics 统计代码</label>
          <p-input
            sync:value="googleAnalytics"
            placeholder="请输入 Google Analytics 统计代码"
            multiline
            rows="5"
          ></p-input>
          <div class="hint">
            请粘贴完整的 Google Analytics 脚本代码，例如：&lt;script&gt;...&lt;/script&gt;
          </div>
        </div>
      </div>
      <div class="dialog-actions">
        <p-button variant="outlined" on:click="handleClose">取消</p-button>
        <p-button on:click="handleSave">保存</p-button>
      </div>
    </div>
  </p-dialog>

  <script>
    import yaml from "/npm/js-yaml@4.1.1/dist/js-yaml.min.mjs";

    export default async ({ load }) => {
      const { getData } = await load("../../util/yaml-handle.js");
      const { toast } = await load("/gh/ofajs/Punch-UI/packages/util.js");
      const { get } = await load("/nos/fs/handle/mount/mount.js");

      return {
        data: {
          open: false,
          googleAnalytics: "",
          _topHandle: null,
          _projectConfig: null,
          projectPath: "",
        },
        watch: {
          async open(val) {
            if (val && this.projectPath) {
              this._topHandle = await get(this.projectPath);
              this._projectConfig = await getData(this._topHandle);
              this.googleAnalytics = this._projectConfig.googleAnalytics || "";
            }
          },
        },
        proto: {
          handleClose() {
            this.open = false;
          },
          async handleSave() {
            try {
              this._projectConfig.googleAnalytics = this.googleAnalytics;

              const configHandle = await this._topHandle.get("_config.yaml");
              const configText = yaml.dump(this._projectConfig);
              await configHandle.write(configText);

              this.open = false;

              toast({
                color: "success",
                message: "谷歌统计设置保存成功",
              });

              this.emit("analytics-saved", {
                bubbles: true,
                composed: true,
              });
            } catch (error) {
              toast({
                color: "error",
                message: "保存失败: " + error.message,
              });
            }
          },
        },
      };
    };
  </script>
</template>
