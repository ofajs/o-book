<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/dialog/dialog.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/input/input.html"></l-m>
  <style>
    .config-dialog {
      width: 400px;
      max-width: 90vw;
    }

    .config-form {
      padding: 16px 0;
    }

    .form-item {
      margin-bottom: 16px;
    }

    .form-item label {
      display: block;
      font-size: 12px;
      color: var(--md-ref-palette-normal40);
      margin-bottom: 4px;
    }

    .form-item p-input {
      width: 100%;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 16px;
    }
  </style>

  <p-dialog :open="open" on:click-mask="handleClose">
    <div class="config-dialog">
      <h3 style="margin: 0 0 8px; font-size: 16px">项目配置</h3>
      <div class="config-form">
        <div class="form-item">
          <label>默认语言 (primaryLang)</label>
          <p-input
            sync:value="editConfig.primaryLang"
            placeholder="如: cn, en"
          ></p-input>
        </div>
        <div class="form-item">
          <label>支持的语言 (languages)</label>
          <p-input
            sync:value="editConfig.languagesText"
            placeholder="多个语言用逗号分隔，如: cn, en, jp"
          ></p-input>
        </div>
      </div>
      <div class="dialog-actions">
        <p-button variant="outlined" on:click="handleClose">取消</p-button>
        <p-button on:click="handleSave">保存</p-button>
      </div>
    </div>
  </p-dialog>

  <script>
    export default async ({ load }) => {
      const { saveData } = await load("../../util/yaml-handle.js");
      const { toast } = await load("/gh/ofajs/Punch-UI/packages/util.js");

      return {
        data: {
          open: false,
          editConfig: {
            primaryLang: "",
            languagesText: "",
          },
          _topHandle: null,
          _projectConfig: null,
          projectPath: "",
        },
        watch: {
          open(val) {
            if (val && this.projectConfig) {
              this.editConfig.primaryLang =
                this.projectConfig.primaryLang || "";
              this.editConfig.languagesText = Array.isArray(
                this.projectConfig.languages,
              )
                ? this.projectConfig.languages.join(", ")
                : "";
            }
          },
        },
        proto: {
          handleClose() {
            this.open = false;
          },
          async handleSave() {
            try {
              const languages = this.editConfig.languagesText
                .split(",")
                .map((lang) => lang.trim())
                .filter((lang) => lang);

              this.projectConfig.primaryLang = this.editConfig.primaryLang;
              this.projectConfig.languages = languages;

              await saveData(
                this._topHandle,
                "_config.yaml",
                this._projectConfig,
              );

              this.open = false;

              toast({
                color: "success",
                message: "配置保存成功",
              });

              this.emit("config-saved", {
                bubbles: true,
                composed: true,
              });
            } catch (error) {
              toast({
                color: "error",
                message: "配置保存失败: " + error.message,
              });
            }
          },
        },
      };
    };
  </script>
</template>
