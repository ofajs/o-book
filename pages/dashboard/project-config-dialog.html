<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/dialog/dialog.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/input/input.html"></l-m>
  <style>
    .config-dialog {
      width: 400px;
      max-width: 90vw;
    }

    .config-form {
      padding: 16px 0;
    }

    .form-item {
      margin-bottom: 16px;
    }

    .form-item label {
      display: block;
      font-size: 12px;
      color: var(--md-ref-palette-normal40);
      margin-bottom: 4px;
    }

    .form-item p-input {
      width: 100%;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 16px;
    }

    .language-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .language-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      color: var(--md-sys-color-on-primary-container);
      background-color: var(--md-sys-color-primary-container);
      border-radius: 16px;
      font-size: 13px;
      gap: 6px;
    }

    .language-tag .delete-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
    }

    .language-tag .delete-btn:hover {
      background-color: var(--md-ref-palette-error-container);
      color: var(--md-ref-palette-error);
    }

    .add-language {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .add-language p-input {
      flex: 1;
    }
  </style>

  <p-dialog :open="open" on:click-mask="handleClose">
    <div class="config-dialog">
      <h3 style="margin: 0 0 8px; font-size: 16px">项目配置</h3>
      <div class="config-form">
        <div class="form-item">
          <label>写作语言 (writingLang)</label>
          <p-input
            sync:value="editConfig.writingLang"
            readonly
            placeholder="写作时使用的语言"
          ></p-input>
        </div>
        <div class="form-item">
          <label>网站初始语言 (primaryLang)</label>
          <p-input
            sync:value="editConfig.primaryLang"
            placeholder="如: cn, en"
          ></p-input>
        </div>
        <div class="form-item">
          <label>支持的语言 (languages)</label>
          <div class="language-tags">
            <o-fill :value="editConfig.languages">
              <div class="language-tag">
                {{$data}}
                <div class="delete-btn" on:click="$host.removeLanguage($data)">
                  ×
                </div>
              </div>
            </o-fill>
          </div>
          <div class="add-language">
            <p-input
              sync:value="newLanguage"
              placeholder="输入语言代码，如: en"
              on:keydown="handleLanguageKeydown"
            ></p-input>
            <p-button on:click="addLanguage">添加</p-button>
          </div>
        </div>
      </div>
      <div class="dialog-actions">
        <p-button variant="outlined" on:click="handleClose">取消</p-button>
        <p-button on:click="handleSave">保存</p-button>
      </div>
    </div>
  </p-dialog>

  <script>
    import yaml from "/npm/js-yaml@4.1.1/dist/js-yaml.min.mjs";

    export default async ({ load }) => {
      const { getData } = await load("../../util/yaml-handle.js");
      const { toast } = await load("/gh/ofajs/Punch-UI/packages/util.js");
      const { get } = await load("/nos/fs/handle/mount/mount.js");

      return {
        data: {
          open: false,
          editConfig: {
            writingLang: "",
            primaryLang: "",
            languages: [],
          },
          newLanguage: "",
          _topHandle: null,
          _projectConfig: null,
          projectPath: "",
        },
        watch: {
          async open(val) {
            if (val && this.projectPath) {
              this._topHandle = await get(this.projectPath);
              this._projectConfig = await getData(this._topHandle);
              this.editConfig.writingLang =
                this._projectConfig.writingLang || "";
              this.editConfig.primaryLang =
                this._projectConfig.primaryLang || "";
              this.editConfig.languages = Array.isArray(
                this._projectConfig.languages,
              )
                ? [...this._projectConfig.languages]
                : [];
            }
          },
        },
        proto: {
          handleClose() {
            this.open = false;
          },
          addLanguage() {
            const lang = this.newLanguage.trim();
            if (lang && !this.editConfig.languages.includes(lang)) {
              this.editConfig.languages.push(lang);
              this.newLanguage = "";
            }
          },
          removeLanguage(lang) {
            const index = this.editConfig.languages.indexOf(lang);
            if (index > -1) {
              this.editConfig.languages.splice(index, 1);
            }
          },
          handleLanguageKeydown(event) {
            if (event.key === "Enter") {
              this.addLanguage();
            }
          },
          async handleSave() {
            try {
              this._projectConfig.primaryLang = this.editConfig.primaryLang;
              this._projectConfig.languages = this.editConfig.languages;

              const configHandle = await this._topHandle.get("_config.yaml");
              const configText = yaml.dump(this._projectConfig);
              await configHandle.write(configText);

              this.open = false;

              toast({
                color: "success",
                message: "配置保存成功",
              });

              this.emit("config-saved", {
                bubbles: true,
                composed: true,
              });
            } catch (error) {
              toast({
                color: "error",
                message: "配置保存失败: " + error.message,
              });
            }
          },
        },
      };
    };
  </script>
</template>
