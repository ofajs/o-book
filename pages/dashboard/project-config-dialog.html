<template page>
  <l-m src="/nos/locale-text/locale-text.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/dialog/dialog.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/input/input.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/select/select.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/chip/chip.html"></l-m>
  <style>
    .config-dialog {
      width: 400px;
      max-width: 90vw;
    }

    .config-form {
      padding: 16px 0;
    }

    .form-item {
      margin-bottom: 16px;
    }

    .form-item label {
      display: block;
      font-size: 12px;
      color: var(--md-ref-palette-normal40);
      margin-bottom: 4px;
    }

    .form-item p-input {
      width: 100%;
    }

    .form-item p-input {
      width: 100%;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 16px;
    }

    .language-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .available-languages {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--md-ref-palette-outline-variant);
    }
  </style>

  <p-dialog :open="open" on:click-mask="handleClose">
    <div class="config-dialog">
      <h3 style="margin: 0 0 8px; font-size: 16px">
        <locale-text>
          <span lang="cn">项目配置</span>
          <span lang="en">Project Settings</span>
        </locale-text>
      </h3>
      <div class="config-form">
        <div class="form-item">
          <label>
            <locale-text>
              <span lang="cn">写作语言 (writingLang)</span>
              <span lang="en">Writing Language (writingLang)</span>
            </locale-text>
          </label>
          <div>{{languageMap[editConfig.writingLang]}}</div>
        </div>
        <div class="form-item">
          <label>
            <locale-text>
              <span lang="cn">网站初始语言 (primaryLang)</span>
              <span lang="en">Primary Language (primaryLang)</span>
            </locale-text>
          </label>
          <p-select
            sync:value="editConfig.primaryLang"
            attr:disabled="editConfig.writingLang === 'en'"
          >
            <x-fill :value="primaryLangOptions">
              <p-option attr:value="$data"
                >{{$host.languageMap[$data]}}</p-option
              >
            </x-fill>
          </p-select>
        </div>
        <div class="form-item">
          <label>
            <locale-text>
              <span lang="cn">支持的语言 (languages)</span>
              <span lang="en">Supported Languages (languages)</span>
            </locale-text>
          </label>
          <div class="language-tags">
            <o-fill :value="editConfig.languages">
              <p-chip tonal>
                {{$host.languageMap[$data]}}
                <x-if
                  :value="$data !== $host.editConfig.writingLang && $data !== 'en'"
                >
                  <n-icon
                    slot="suffix"
                    icon="material-symbols:close"
                    button
                    on:click="$host.removeLanguage($data)"
                  ></n-icon>
                </x-if>
              </p-chip>
            </o-fill>
          </div>
          <h5 style="margin: 16px 0 0; color: var(--md-ref-palette-normal40)">
            <locale-text>
              <span lang="cn">可添加的语言</span>
              <span lang="en">Available Languages</span>
            </locale-text>
          </h5>
          <div class="available-languages">
            <o-fill :value="availableLanguagesToAdd">
              <p-chip button tonal on:click="$host.toggleLanguage($data)">
                {{$host.languageMap[$data]}}
                <n-icon
                  icon="material-symbols:add-rounded"
                  slot="suffix"
                ></n-icon>
              </p-chip>
            </o-fill>
          </div>
        </div>
      </div>
      <div class="dialog-actions">
        <p-button variant="outlined" on:click="handleClose">
          <locale-text>
            <span lang="cn">取消</span>
            <span lang="en">Cancel</span>
          </locale-text>
        </p-button>
        <p-button on:click="handleSave">
          <locale-text>
            <span lang="cn">保存</span>
            <span lang="en">Save</span>
          </locale-text>
        </p-button>
      </div>
    </div>
  </p-dialog>

  <script>
    import yaml from "/npm/js-yaml@4.1.1/dist/js-yaml.min.mjs";
    import { getLocaleText } from "/nos/locale-text/get-locale-text.js";

    export default async ({ load }) => {
      const { getData } = await load("../../util/yaml-handle.js");
      const { toast } = await load("/gh/ofajs/Punch-UI/packages/util.js");
      const { get } = await load("/nos/fs/handle/mount/mount.js");
      const { LANGUAGES } = await load("../translate/util/translate.js");

      return {
        data: {
          open: false,
          editConfig: {
            writingLang: "",
            primaryLang: "",
            languages: [],
          },
          availableLanguages: Object.keys(LANGUAGES),
          languageMap: LANGUAGES,
          _topHandle: null,
          _projectConfig: null,
          projectPath: "",
        },
        watch: {
          async open(val) {
            if (val && this.projectPath) {
              this._topHandle = await get(this.projectPath);
              this._projectConfig = await getData(this._topHandle);

              this.editConfig.writingLang =
                this._projectConfig.writingLang || "";
              this.editConfig.primaryLang =
                this._projectConfig.primaryLang || "";
              this.editConfig.languages = Array.isArray(
                this._projectConfig.languages,
              )
                ? [...this._projectConfig.languages]
                : [];
            }
          },
          "editConfig.writingLang"(val) {
            if (val === "en") {
              this.editConfig.primaryLang = "en";
            } else if (
              !this.primaryLangOptions.includes(this.editConfig.primaryLang)
            ) {
              this.editConfig.primaryLang = val;
            }
          },
        },
        proto: {
          get primaryLangOptions() {
            const options = [];
            if (this.editConfig.writingLang) {
              options.push(this.editConfig.writingLang);
            }
            if (this.editConfig.writingLang !== "en") {
              options.push("en");
            }
            return options;
          },
          get availableLanguagesToAdd() {
            return this.availableLanguages.filter(
              (lang) => !this.editConfig.languages.includes(lang),
            );
          },
          handleClose() {
            this.open = false;
          },
          toggleLanguage(lang) {
            const index = this.editConfig.languages.indexOf(lang);
            if (index > -1) {
              this.editConfig.languages.splice(index, 1);
            } else {
              this.editConfig.languages.push(lang);
            }
          },
          removeLanguage(lang) {
            if (lang === this.editConfig.writingLang || lang === "en") {
              return;
            }
            const index = this.editConfig.languages.indexOf(lang);
            if (index > -1) {
              this.editConfig.languages.splice(index, 1);
            }
          },
          async handleSave() {
            try {
              this._projectConfig.primaryLang = this.editConfig.primaryLang;
              this._projectConfig.languages = this.editConfig.languages;

              const configHandle = await this._topHandle.get("_config.yaml");
              const configText = yaml.dump(this._projectConfig);
              await configHandle.write(configText);

              this.open = false;

              toast({
                color: "success",
                message: getLocaleText({
                  cn: "配置保存成功",
                  en: "Settings saved successfully",
                }),
              });

              this.emit("config-saved", {
                bubbles: true,
                composed: true,
              });
            } catch (error) {
              toast({
                color: "error",
                message: getLocaleText({
                  cn: "配置保存失败: " + error.message,
                  en: "Failed to save settings: " + error.message,
                }),
              });
            }
          },
        },
      };
    };
  </script>
</template>
