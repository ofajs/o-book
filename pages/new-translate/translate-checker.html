  <script>
    import { LANGUAGES, translate } from "../translate/util/translate.js";
    import { getArticleData } from "../translate/util/article-data.js";
    import { checkBlock } from "../translate/util/check-translation.js";
    import { EverCache, storage } from "/gh/kirakiray/ever-cache/src/main.js";

    export default async ({ load }) => {
      const { get } = await load("/nos/fs/main.js");
      const { getData } = await load("../../util/yaml-handle.js");

      return {
        data: {
          projectPath: "",
          config: null,
          allArticles: [],
          targetLanguages: [],
          articleList: [],
          activeArticlePath: "",
          activeLang: "",
          issueBlocks: [],
          currentArticleName: "",
          currentLangName: "",
          isChecking: true,
          isRetrying: false,
          shouldStopRetry: false,
          checkProgress: 0,
          checkStep: "",
          checkedCount: 0,
          totalToCheck: 0,
          retryAttemptCount: 0,
          retryTotalCount: 0,
          retrySuccessCount: 0,
          retryFailedCount: 0,
          retryStep: "",
          retryItems: [],
          stats: {
            totalBlocks: 0,
            issueBlocks: 0,
          },
          _storages: {},
        },
        watch: {
          projectPath() {
            if (this.projectPath) {
              this.loadArticles();
            }
          },
        },
        proto: {
          get retryProgress() {
            if (this.retryTotalCount === 0) return 0;
            return Math.round((this.retryCompletedCount / this.retryTotalCount) * 100);
          },
          get retryRemainingCount() {
            return this.retryTotalCount - this.retryCompletedCount;
          },
          get retryCompletedCount() {
            return this.retrySuccessCount + this.retryFailedCount;
          },
          getStorage(lang) {
            const key = "translates-" + lang + this.projectPath;
            if (!this._storages[key]) {
              this._storages[key] = new EverCache(key);
            }
            return this._storages[key];
          },
          getPreview(text) {
            if (!text) return "";
            const preview = text.trim().substring(0, 100);
            return preview.length < text.trim().length ? preview + "..." : preview;
          },
          async loadArticles() {
            this.isChecking = true;
            this.checkProgress = 0;
            this.checkedCount = 0;
            this.articleList = [];
            this.issueBlocks = [];
            this.stats = { totalBlocks: 0, issueBlocks: 0 };

            try {
              const handle = await get(this.projectPath);
              this.config = await getData(handle);
              const articleList = await getArticleData(
                await handle.get(this.config.writingLang),
                { isRoot: true },
              );

              if (!articleList || articleList.length === 0) {
                this.allArticles = [];
                this.isChecking = false;
                return;
              }

              this.allArticles = articleList;
              this.targetLanguages = this.config.languages.filter(
                (lang) => lang !== this.config.writingLang,
              );

              await this.checkAllLanguages();
            } catch (error) {
              console.error("Failed to load articles:", error);
              this.allArticles = [];
            } finally {
              this.isChecking = false;
            }
          },
          async checkAllLanguages() {
            const articlesWithIssues = [];
            let totalTranslatedBlocks = 0;
            let totalIssueBlocks = 0;

            const totalChecks =
              this.allArticles.length * this.targetLanguages.length;
            this.totalToCheck = totalChecks;
            let currentCheck = 0;

            for (const lang of this.targetLanguages) {
              const langStorage = this.getStorage(lang);
              const langName = LANGUAGES[lang] || lang;

              for (const article of this.allArticles) {
                currentCheck++;
                this.checkedCount = currentCheck;
                this.checkStep = `检查 ${article.name} (${langName})`;
                this.checkProgress = Math.round(
                  (currentCheck / totalChecks) * 100,
                );

                if (!article.blocks || article.blocks.length === 0) continue;

                const issueData = [];
                for (let i = 0; i < article.blocks.length; i++) {
                  const block = article.blocks[i];
                  const result = await checkBlock(
                    block,
                    langStorage,
                    lang,
                    this.projectPath,
                    this.config.writingLang,
                  );
                  if (result) {
                    totalTranslatedBlocks++;
                    result.fileName = article.name;
                    result.blockIndex = i + 1;
                    result.lang = lang;
                    result.langName = langName;
                    issueData.push(result);
                    totalIssueBlocks++;
                  } else {
                    const cachedData = await langStorage.getItem(block.rawHash);
                    if (cachedData) {
                      totalTranslatedBlocks++;
                    }
                  }
                }

                if (issueData.length > 0) {
                  articlesWithIssues.push({
                    name: article.name,
                    path: article.path,
                    realPath: article.realPath,
                    lang: lang,
                    langName: langName,
                    issueCount: issueData.length,
                    issueData: issueData,
                  });
                }
              }
            }

            this.articleList = articlesWithIssues;
            this.stats = {
              totalBlocks: totalTranslatedBlocks,
              issueBlocks: totalIssueBlocks,
            };

            if (articlesWithIssues.length > 0) {
              this.clickItem(articlesWithIssues[0]);
            } else {
              this.issueBlocks = [];
              this.currentArticleName = "";
              this.activeArticlePath = "";
              this.activeLang = "";
            }
          },
          clickItem(item) {
            this.activeArticlePath = item.path;
            this.activeLang = item.lang;
            this.currentArticleName = item.name;
            this.currentLangName = item.langName;
            this.issueBlocks = item.issueData || [];
          },
          async refreshCheck() {
            await this.loadArticles();
          },
          async retrySingleBlock(issueBlock) {
            const langStorage = this.getStorage(issueBlock.lang);

            try {
              await translate(
                issueBlock.block.raw,
                this.config.writingLang,
                issueBlock.lang,
                ({ provider, id, model, content, done }) => {
                  if (done) {
                    langStorage.setItem(issueBlock.block.rawHash, {
                      text: content,
                      provider: provider,
                      model: model,
                      id: id,
                      editedText: "",
                    });
                  }
                },
              );

              const index = this.issueBlocks.findIndex(
                (b) =>
                  b.block.rawHash === issueBlock.block.rawHash &&
                  b.lang === issueBlock.lang,
              );
              if (index !== -1) {
                this.issueBlocks = this.issueBlocks.filter(
                  (_, i) => i !== index,
                );
                this.stats.issueBlocks--;
              }

              const articleItem = this.articleList.find(
                (a) =>
                  a.path === this.activeArticlePath &&
                  a.lang === this.activeLang,
              );
              if (articleItem) {
                articleItem.issueData = articleItem.issueData.filter(
                  (b) =>
                    !(
                      b.block.rawHash === issueBlock.block.rawHash &&
                      b.lang === issueBlock.lang
                    ),
                );
                articleItem.issueCount = articleItem.issueData.length;
                if (articleItem.issueCount === 0) {
                  this.articleList = this.articleList.filter(
                    (a) =>
                      !(
                        a.path === this.activeArticlePath &&
                        a.lang === this.activeLang
                      ),
                  );
                  if (this.articleList.length > 0) {
                    this.clickItem(this.articleList[0]);
                  } else {
                    this.issueBlocks = [];
                    this.currentArticleName = "";
                    this.activeArticlePath = "";
                    this.activeLang = "";
                  }
                }
              }

              return { success: true };
            } catch (error) {
              console.error("Retry failed:", error);
              return { success: false, error: error.message };
            }
          },
          async retryAllIssues() {
            this.isRetrying = true;
            this.shouldStopRetry = false;
            this.retryCompletedCount = 0;
            this.retrySuccessCount = 0;
            this.retryFailedCount = 0;
            this.retryItems = [];

            const allIssueBlocks = [];
            for (const article of this.articleList) {
              for (const issue of article.issueData) {
                allIssueBlocks.push({
                  ...issue,
                  articleName: article.name,
                });
              }
            }

            this.retryTotalCount = allIssueBlocks.length;

            if (this.retryTotalCount === 0) {
              this.isRetrying = false;
              return;
            }

            const keys = (await storage.getItem("ai-keys")) || [];
            let concurrencyLimit = 3;
            if (keys.length > 0) {
              const totalConcurrency = keys.reduce((sum, key) => {
                return sum + (key.concurrency || 1);
              }, 0);
              concurrencyLimit = Math.max(3, totalConcurrency);
            }

            const executingTasks = new Set();

            const translateBlock = async (issueBlock) => {
              if (this.shouldStopRetry) {
                return { stopped: true };
              }

              const retryItem = {
                articleName: issueBlock.articleName,
                blockIndex: issueBlock.blockIndex,
                lang: issueBlock.lang,
                langName: issueBlock.langName,
                preview: this.getPreview(issueBlock.block.raw),
                streamContent: "",
                status: "translating",
                issueBlock: issueBlock,
              };

              this.retryItems = [...this.retryItems, retryItem];
              this.retryStep = `翻译 ${issueBlock.langName}...`;

              const langStorage = this.getStorage(issueBlock.lang);

              try {
                await translate(
                  issueBlock.block.raw,
                  this.config.writingLang,
                  issueBlock.lang,
                  ({ provider, id, model, content, done }) => {
                    if (this.shouldStopRetry) return;

                    const index = this.retryItems.findIndex(
                      (t) =>
                        t.articleName === retryItem.articleName &&
                        t.blockIndex === retryItem.blockIndex &&
                        t.lang === retryItem.lang,
                    );
                    if (index !== -1) {
                      this.retryItems[index].streamContent = content;
                    }

                    if (done) {
                      langStorage.setItem(issueBlock.block.rawHash, {
                        text: content,
                        provider: provider,
                        model: model,
                        id: id,
                        editedText: "",
                      });
                    }
                  },
                );

                if (this.shouldStopRetry) {
                  this.retryItems = this.retryItems.filter(
                    (t) =>
                      t.articleName !== retryItem.articleName ||
                      t.blockIndex !== retryItem.blockIndex ||
                      t.lang !== retryItem.lang,
                  );
                  return { stopped: true };
                }

                this.retrySuccessCount++;

                const index = this.retryItems.findIndex(
                  (t) =>
                    t.articleName === retryItem.articleName &&
                    t.blockIndex === retryItem.blockIndex &&
                    t.lang === retryItem.lang,
                );
                if (index !== -1) {
                  this.retryItems[index].status = "completed";
                }

                return { stopped: false, success: true };
              } catch (error) {
                console.error("Translation failed:", error);

                this.retryFailedCount++;

                const index = this.retryItems.findIndex(
                  (t) =>
                    t.articleName === retryItem.articleName &&
                    t.blockIndex === retryItem.blockIndex &&
                    t.lang === retryItem.lang,
                );
                if (index !== -1) {
                  this.retryItems[index].status = "failed";
                }

                return { stopped: false, success: false };
              }
            };

            for (const issueBlock of allIssueBlocks) {
              if (this.shouldStopRetry) break;

              const task = translateBlock(issueBlock)
                .then((result) => {
                  if (result?.stopped) {
                    executingTasks.delete(task);
                  }
                  return result;
                })
                .finally(() => {
                  executingTasks.delete(task);
                });

              executingTasks.add(task);

              if (executingTasks.size >= concurrencyLimit) {
                await Promise.race(executingTasks);
              }
            }

            if (executingTasks.size > 0 && !this.shouldStopRetry) {
              await Promise.all(executingTasks);
            }

            this.isRetrying = false;
            this.retryAttemptCount++;

            if (!this.shouldStopRetry) {
              await this.loadArticles();
            }
          },
          stopRetry() {
            this.shouldStopRetry = true;
            this.retryItems = [];
            this.isRetrying = false;
          },
          goToNext() {
            this.emit("next-step", { composed: true });
          },
        },
        attached() {
          if (this.projectPath) {
            this.loadArticles();
          }
        },
      };
    };
  </script>
</template>
