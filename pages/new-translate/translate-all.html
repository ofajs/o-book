<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/button/button.html"></l-m>
  <style>
    :host {
      display: block;
      height: 100%;
      padding: 16px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .status-card {
      padding: 24px;
      border-radius: 12px;
      background-color: var(--md-sys-color-surface);
      margin-bottom: 16px;
    }
    .status-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 12px;
      color: var(--md-sys-color-on-surface);
    }
    .status-content {
      font-size: 14px;
      color: var(--md-sys-color-on-surface-variant);

    }
    .stats {
      display: flex;
      gap: 24px;

    }
    .stat-item {
      display: flex;
      flex-direction: column;

    .stat-number {

    .stat-label {

    }
    .language-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .language-card {
      padding: 16px;
      border-radius: 8px;
      background-color: var(--md-sys-color-surface-container);
      border-left: 4px solid var(--md-sys-color-primary);
    }
    .language-card.completed {
      border-left-color: var(--md-sys-color-success);
    }
    .language-card.in-progress {

    .language-header {
      display: flex;

    .language-name {

    .language-code {

    .language-stats {
      display: flex;

    .lang-stat {
      display: flex;

    .lang-stat-number {
      font-size: 20px;
      font-weight: 600;
    }
    .lang-stat-label {
      font-size: 11px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background-color: var(--md-sys-color-primary);
      transition: width 0.3s ease;
    }
    .progress-fill.completed {

    }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .loading {
      text-align: center;
      padding: 48px 24px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .button-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }
    .summary-card {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 20px;
      background-color: var(--md-sys-color-surface-container);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .summary-number {
      font-size: 28px;
      font-weight: 600;
      color: var(--md-sys-color-primary);
    }
    .summary-label {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .check-progress {
      margin-top: 16px;
      padding: 12px;
      background-color: var(--md-sys-color-surface-container);
      border-radius: 8px;
    }
    .check-progress-text {
      font-size: 14px;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 8px;
    }
  </style>

  <div class="container">
    <o-if :value="loading">
      <div class="loading">
        <div>正在加载项目数据...</div>
      </div>
    </o-if>
    <o-else-if :value="!loading && allArticles.length === 0">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div>暂无文章数据</div>
      </div>
    </o-else-if>
    <o-else>
      <o-if :value="checkingStatus">
        <div class="status-card">
          <div class="status-title">正在检查翻译状态</div>
          <div class="check-progress">
            <div class="check-progress-text">
              正在检查 {{checkingLangName}} ({{checkingLangIndex}} / {{totalLangs}})
            </div>
            <div class="progress-bar">
              <div
                class="progress-fill"
                :style.width="((checkingLangIndex / totalLangs) * 100) + '%'"
              ></div>
            </div>
          </div>
        </div>
      </o-if>
      <o-else>
        <div class="status-card">
          <div class="status-title">翻译状态总览</div>
          <div class="status-content">
            项目共包含 <strong>{{totalBlocks}}</strong> 个内容块，
            <strong>{{targetLanguages.length}}</strong> 种目标语言
          </div>
          
          <div class="summary-card">
            <div class="summary-item">
              <div class="summary-number">{{totalTranslatedBlocks}}</div>
              <div class="summary-label">已翻译块数</div>
            </div>
            <div class="summary-item">
              <div class="summary-number" style="color: var(--md-sys-color-normal)">
                {{totalUntranslatedBlocks}}
              </div>
              <div class="summary-label">待翻译块数</div>
            </div>
            <div class="summary-item">
              <div class="summary-number" style="color: var(--md-sys-color-success)">
                {{completedLanguagesCount}}
              </div>
              <div class="summary-label">已完成语言</div>
            </div>
            <div class="summary-item">
              <div class="summary-number" style="color: var(--md-sys-color-warning)">
                {{inProgressLanguagesCount}}
              </div>
              <div class="summary-label">进行中语言</div>
            </div>
          </div>

          <div class="button-container">
            <p-button variant="outlined" on:click="refreshStatus">
              刷新状态
            </p-button>
          </div>
        </div>

        <div class="status-card">
          <div class="status-title">各语言翻译详情</div>
          <div class="language-grid">
            <o-fill :value="languageStats">
              <div
                class="language-card"
                class:completed="$data.progress === 100"
                class:in-progress="$data.progress > 0 && $data.progress < 100"
              >
                <div class="language-header">
                  <div class="language-name">{{$data.languageName}}</div>
                  <div class="language-code">{{$data.languageCode}}</div>
                </div>
                <div class="language-stats">
                  <div class="lang-stat">
                    <div
                      class="lang-stat-number"
                      style="color: var(--md-sys-color-success)"
                    >
                      {{$data.translated}}
                    </div>
                    <div class="lang-stat-label">已翻译</div>
                  </div>
                  <div class="lang-stat">
                    <div
                      class="lang-stat-number"
                      style="color: var(--md-sys-color-normal)"
                    >
                      {{$data.untranslated}}
                    </div>
                    <div class="lang-stat-label">待翻译</div>
                  </div>
                  <div class="lang-stat">
                    <div class="lang-stat-number" style="color: var(--md-sys-color-primary)">
                      {{$data.progress}}%
                    </div>
                    <div class="lang-stat-label">进度</div>
                  </div>
                </div>
                <div class="progress-bar">
                  <div
                    class="progress-fill"
                    class:completed="$data.progress === 100"
                    :style.width="$data.progress + '%'"
                  ></div>
                </div>
              </div>
            </o-fill>
          </div>
        </div>
      </o-else>
    </o-else>
  </div>

  <o-consumer name="project-data" watch:project-path="projectPath"></o-consumer>
  <script>
    import { LANGUAGES } from "../translate/util/translate.js";
    import { getArticleData } from "../translate/util/article-data.js";
    import { EverCache, storage } from "/gh/kirakiray/ever-cache/src/main.js";

    export default async ({ load, query }) => {
      const { get } = await load("/nos/fs/main.js");
      const { getData } = await load("../../util/yaml-handle.js");

      return {
        data: {
          projectPath: "",
          loading: true,
          checkingStatus: false,
          checkingLangIndex: 0,
          checkingLangName: "",
          totalLangs: 0,
          config: null,
          allArticles: [],
          totalBlocks: 0,
          targetLanguages: [],
          languageStats: [],
          _storages: {},
        },
        watch: {
          projectPath() {
            if (this.projectPath) {
              this.loadProjectData();
            }
          },
        },
        proto: {
          get totalTranslatedBlocks() {
            return this.languageStats.reduce((sum, stat) => sum + stat.translated, 0);
          },
          get totalUntranslatedBlocks() {
            return this.languageStats.reduce((sum, stat) => sum + stat.untranslated, 0);
          },
          get completedLanguagesCount() {
            return this.languageStats.filter(stat => stat.progress === 100).length;
          },
          get inProgressLanguagesCount() {
            return this.languageStats.filter(stat => stat.progress > 0 && stat.progress < 100).length;
          },
          async loadProjectData() {
            try {
              this.loading = true;
              const handle = await get(this.projectPath);
              this.config = await getData(handle);
              
              const articleList = await getArticleData(
                await handle.get(this.config.writingLang),
                { isRoot: true },
              );

              if (!articleList || articleList.length === 0) {
                this.allArticles = [];
                this.loading = false;
                return;
              }

              this.allArticles = articleList;
              this.totalBlocks = this.calculateTotalBlocks();
              
              this.targetLanguages = this.config.languages.filter(
                lang => lang !== this.config.writingLang
              );

              await this.checkAllLanguagesStatus();
            } catch (error) {
              console.error("Failed to load project data:", error);
              this.allArticles = [];
            } finally {
              this.loading = false;
            }
          },
          calculateTotalBlocks() {
            let total = 0;
            for (const article of this.allArticles) {
              if (article.isTemp && article.blocks && article.blocks.length > 0) {
                total++;
              } else if (article.blocks && article.blocks.length > 0) {
                for (const block of article.blocks) {
                  if (block.type === "space") continue;
                  total++;
                }
              }
            }
            return total;
          },
          getStorage(lang) {
            const key = "translates-" + lang + this.projectPath;
            if (!this._storages[key]) {
              this._storages[key] = new EverCache(key);
            }
            return this._storages[key];
          },
          async checkAllLanguagesStatus() {
            this.checkingStatus = true;
            this.totalLangs = this.targetLanguages.length;
            this.languageStats = [];

            for (let i = 0; i < this.targetLanguages.length; i++) {
              const lang = this.targetLanguages[i];
              this.checkingLangIndex = i + 1;
              this.checkingLangName = LANGUAGES[lang] || lang;

              const stat = await this.checkLanguageStatus(lang);
              this.languageStats = [...this.languageStats, stat];
            }

            this.checkingStatus = false;
          },
          async checkLanguageStatus(lang) {
            const storage = this.getStorage(lang);
            let translated = 0;
            let untranslated = 0;

            for (const article of this.allArticles) {
              if (article.isTemp && article.blocks && article.blocks.length > 0) {
                const cachedData = await storage.getItem(article.blocks[0].rawHash);
                if (cachedData) {
                  translated++;
                } else {
                  untranslated++;
                }
              } else if (article.blocks && article.blocks.length > 0) {
                for (const block of article.blocks) {
                  if (block.type === "space") continue;
                  const cachedData = await storage.getItem(block.rawHash);
                  if (cachedData) {
                    translated++;
                  } else {
                    untranslated++;
                  }
                }
              }
            }

            const total = translated + untranslated;
            const progress = total > 0 ? Math.round((translated / total) * 100) : 0;

            return {
              languageCode: lang,
              languageName: LANGUAGES[lang] || lang,
              translated,
              untranslated,
              total,
              progress,
            };
          },
          refreshStatus() {
            this.loadProjectData();
          },
        },
      };
    };
  </script>
</template>
