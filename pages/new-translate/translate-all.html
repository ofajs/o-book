                    </div>
                    <div class="lang-stat-label">待翻译</div>
                  </div>
                  <div class="lang-stat">
                    <div class="lang-stat-number" style="color: var(--md-sys-color-primary)">
                      {{$data.progress}}%
                    </div>
                    <div class="lang-stat-label">进度</div>
                  </div>
                </div>
                <div class="progress-bar">
                  <div
                    class="progress-fill"
                    class:completed="$data.progress === 100"
                    :style.width="$data.progress + '%'"

                <o-if :value="!$host.isTranslating && $data.translated > 0">

  <o-consumer name="project-data" watch:project-path="projectPath"></o-consumer>
  <script>
    import { LANGUAGES, translate } from "../translate/util/translate.js";
    import { getArticleData } from "../translate/util/article-data.js";
    import { EverCache, storage } from "/gh/kirakiray/ever-cache/src/main.js";
    import { confirm } from "/gh/ofajs/Punch-UI/packages/util.js";

    export default async ({ load, query }) => {
      const { get } = await load("/nos/fs/main.js");
      const { getData } = await load("../../util/yaml-handle.js");

      return {
        data: {
          projectPath: "",
          loading: true,
          loadingStep: "初始化...",
          loadingProgress: 0,
          checkingStatus: false,
          checkingLangIndex: 0,
          checkingLangName: "",
          totalLangs: 0,
          config: null,
          allArticles: [],
          totalBlocks: 0,
          targetLanguages: [],
          languageStats: [],
          _storages: {},
          isTranslating: false,
          shouldStop: false,
          translatingItems: [],
          failedItems: [],
          translatedInSession: 0,
          totalToTranslate: 0,
          translatingStep: "",
          isGenerating: false,
          generatingStep: "",
          generatedCount: 0,
          totalToGenerate: 0,
          generatedFiles: [],
          _rootHandle: null,
        },
        watch: {
          projectPath() {
            if (this.projectPath) {
              this.loadProjectData();
            }
          },
        },
        proto: {
          get totalTranslatedBlocks() {
            return this.languageStats.reduce((sum, stat) => sum + stat.translated, 0);
          },
          get totalUntranslatedBlocks() {
            return this.languageStats.reduce((sum, stat) => sum + stat.untranslated, 0);
          },
          get completedLanguagesCount() {
            return this.languageStats.filter(stat => stat.progress === 100).length;
          },
          get inProgressLanguagesCount() {
            return this.languageStats.filter(stat => stat.progress > 0 && stat.progress < 100).length;
          },
          get translationProgress() {
            if (this.totalToTranslate === 0) return 0;
            return Math.round((this.translatedInSession / this.totalToTranslate) * 100);
          },
          get generatingProgress() {
            if (this.totalToGenerate === 0) return 0;
            return Math.round((this.generatedCount / this.totalToGenerate) * 100);
          },
          async loadProjectData() {
            try {
              this.loading = true;
              this.loadingProgress = 0;
              this.loadingStep = "获取项目句柄...";
              const handle = await get(this.projectPath);
              this.loadingProgress = 10;

              this.loadingStep = "加载配置数据...";
              this.config = await getData(handle);
              this.loadingProgress = 20;

              this.loadingStep = "加载文章数据...";
              const articleList = await getArticleData(
                await handle.get(this.config.writingLang),
                { isRoot: true },
              );
              this.loadingProgress = 40;

              if (!articleList || articleList.length === 0) {
                this.allArticles = [];
                this.loading = false;
                return;
              }

              this.loadingStep = "计算内容块数量...";
              this.allArticles = articleList;
              this.totalBlocks = this.calculateTotalBlocks();
              this.loadingProgress = 50;

              this.loadingStep = "准备检查翻译状态...";
              this.targetLanguages = this.config.languages.filter(
                lang => lang !== this.config.writingLang
              );

              await this.checkAllLanguagesStatus();
            } catch (error) {
              console.error("Failed to load project data:", error);
              this.allArticles = [];
            } finally {
              this.loading = false;
            }
          },
          calculateTotalBlocks() {
            let total = 0;
            for (const article of this.allArticles) {
              if (article.isTemp && article.blocks && article.blocks.length > 0) {
                total++;
              } else if (article.blocks && article.blocks.length > 0) {
                for (const block of article.blocks) {
                  if (block.type === "space") continue;
                  total++;
                }
              }
            }
            return total;
          },
          getStorage(lang) {
            const key = "translates-" + lang + this.projectPath;
            if (!this._storages[key]) {
              this._storages[key] = new EverCache(key);
            }
            return this._storages[key];
          },
          async checkAllLanguagesStatus() {
            this.checkingStatus = true;
            this.totalLangs = this.targetLanguages.length;
            this.languageStats = [];

            const baseProgress = 50;
            const progressPerLang = this.targetLanguages.length > 0 
              ? 50 / this.targetLanguages.length 
              : 0;

            for (let i = 0; i < this.targetLanguages.length; i++) {
              const lang = this.targetLanguages[i];
              this.checkingLangIndex = i + 1;
              this.checkingLangName = LANGUAGES[lang] || lang;
              this.loadingStep = `检查 ${this.checkingLangName} 翻译状态...`;

              const stat = await this.checkLanguageStatus(lang);
              this.languageStats = [...this.languageStats, stat];
              
              this.loadingProgress = Math.round(baseProgress + (i + 1) * progressPerLang);
            }

            this.checkingStatus = false;
            this.loadingProgress = 100;
            this.loadingStep = "加载完成";
          },
          async checkLanguageStatus(lang) {
            const storage = this.getStorage(lang);
            let translated = 0;
            let untranslated = 0;

            for (const article of this.allArticles) {
              if (article.isTemp && article.blocks && article.blocks.length > 0) {
                const cachedData = await storage.getItem(article.blocks[0].rawHash);
                if (cachedData) {
                  translated++;
                } else {
                  untranslated++;
                }
              } else if (article.blocks && article.blocks.length > 0) {
                for (const block of article.blocks) {
                  if (block.type === "space") continue;
                  const cachedData = await storage.getItem(block.rawHash);
                  if (cachedData) {
                    translated++;
                  } else {
                    untranslated++;
                  }
                }
              }
            }

            const total = translated + untranslated;
            const progress = total > 0 ? Math.round((translated / total) * 100) : 0;

            return {
              languageCode: lang,
              languageName: LANGUAGES[lang] || lang,
              translated,
              untranslated,
              total,
              progress,
            };
          },
          refreshStatus() {
            this.loadProjectData();
          },
          getPreview(text) {
            if (!text) return "";
            const preview = text.trim().substring(0, 100);
            return preview.length < text.trim().length ? preview + "..." : preview;
          },
          async startTranslation() {
            this.isTranslating = true;
            this.shouldStop = false;
            this.translatingItems = [];
            this.failedItems = [];
            this.translatedInSession = 0;
            this.translatingStep = "准备翻译任务...";

            const untranslatedBlocks = [];

            for (const lang of this.targetLanguages) {
              const langStorage = this.getStorage(lang);
              const langName = LANGUAGES[lang] || lang;

              for (const article of this.allArticles) {
                if (article.isTemp && article.blocks && article.blocks.length > 0) {
                  const cachedData = await langStorage.getItem(article.blocks[0].rawHash);
                  if (!cachedData) {
                    untranslatedBlocks.push({
                      article,
                      block: article.blocks[0],
                      blockIndex: 0,
                      lang,
                      langName,
                    });
                  }
                } else if (article.blocks && article.blocks.length > 0) {
                  for (let i = 0; i < article.blocks.length; i++) {
                    const block = article.blocks[i];
                    if (block.type === "space") continue;
                    const cachedData = await langStorage.getItem(block.rawHash);
                    if (!cachedData) {
                      untranslatedBlocks.push({
                        article,
                        block,
                        blockIndex: i,
                        lang,
                        langName,
                      });
                    }
                  }
                }
              }
            }

            this.totalToTranslate = untranslatedBlocks.length;

            if (this.totalToTranslate === 0) {
              this.isTranslating = false;
              return;
            }

            const keys = (await storage.getItem("ai-keys")) || [];
            let concurrencyLimit = 3;
            if (keys.length > 0) {
              const totalConcurrency = keys.reduce((sum, key) => {
                return sum + (key.concurrency || 1);
              }, 0);
              concurrencyLimit = Math.max(3, totalConcurrency);
            }

            const executingTasks = new Set();

            const translateBlock = async (item) => {
              if (this.shouldStop) {
                return { stopped: true };
              }

              const translatingItem = {
                articleName: item.article.name,
                blockIndex: item.blockIndex,
                lang: item.lang,
                langName: item.langName,
                preview: this.getPreview(item.block.raw),
                streamContent: "",
              };

              this.translatingItems = [...this.translatingItems, translatingItem];
              this.translatingStep = `翻译 ${item.langName}...`;

              try {
                await translate(
                  item.block.raw,
                  this.config.writingLang,
                  item.lang,
                  ({ provider, id, model, content, done }) => {
                    if (this.shouldStop) return;

                    const index = this.translatingItems.findIndex(
                      (t) =>
                        t.articleName === translatingItem.articleName &&
                        t.blockIndex === translatingItem.blockIndex &&
                        t.lang === translatingItem.lang,
                    );
                    if (index !== -1) {
                      this.translatingItems[index].streamContent = content;
                    }

                    if (done) {
                      const langStorage = this.getStorage(item.lang);
                      langStorage.setItem(item.block.rawHash, {
                        text: content,
                        provider: provider,
                        model: model,
                        id: id,
                        editedText: "",
                      });
                    }
                  },
                );

                if (this.shouldStop) {
                  this.translatingItems = this.translatingItems.filter(
                    (t) =>
                      t.articleName !== translatingItem.articleName ||
                      t.blockIndex !== translatingItem.blockIndex ||
                      t.lang !== translatingItem.lang,
                  );
                  return { stopped: true };
                }

                this.translatedInSession++;

                const langStat = this.languageStats.find(s => s.languageCode === item.lang);
                if (langStat) {
                  langStat.translated++;
                  langStat.untranslated--;
                  langStat.progress = Math.round((langStat.translated / langStat.total) * 100);
                }

                this.translatingItems = this.translatingItems.filter(
                  (t) =>
                    t.articleName !== translatingItem.articleName ||
                    t.blockIndex !== translatingItem.blockIndex ||
                    t.lang !== translatingItem.lang,
                );
                return { stopped: false };
              } catch (error) {
                console.error("Translation failed:", error);
                this.translatingItems = this.translatingItems.filter(
                  (t) =>
                    t.articleName !== translatingItem.articleName ||
                    t.blockIndex !== translatingItem.blockIndex ||
                    t.lang !== translatingItem.lang,
                );

                const failedItem = {
                  ...translatingItem,
                  error: error.message || "翻译失败",
                  item: item,
                };
                this.failedItems = [...this.failedItems, failedItem];
                return { stopped: false };
              }
            };

            for (const item of untranslatedBlocks) {
              if (this.shouldStop) break;

              const task = translateBlock(item)
                .then((result) => {
                  if (result?.stopped) {
                    executingTasks.delete(task);
                  }
                  return result;
                })
                .finally(() => {
                  executingTasks.delete(task);
                });

              executingTasks.add(task);

              if (executingTasks.size >= concurrencyLimit) {
                await Promise.race(executingTasks);
              }
            }

            if (executingTasks.size > 0 && !this.shouldStop) {
              await Promise.all(executingTasks);
            }

            this.isTranslating = false;
          },
          stopTranslation() {
            this.shouldStop = true;
            this.translatingItems = [];
            this.isTranslating = false;
          },
          async retryFailedItem(failedItem) {
            this.failedItems = this.failedItems.filter(
              (item) =>
                item.articleName !== failedItem.articleName ||
                item.blockIndex !== failedItem.blockIndex ||
                item.lang !== failedItem.lang,
            );

            const translatingItem = {
              articleName: failedItem.articleName,
              blockIndex: failedItem.blockIndex,
              lang: failedItem.lang,
              langName: failedItem.langName,
              preview: failedItem.preview,
              streamContent: "",
            };

            this.translatingItems = [...this.translatingItems, translatingItem];

            try {
              await translate(
                failedItem.item.block.raw,
                this.config.writingLang,
                failedItem.item.lang,
                ({ provider, id, model, content, done }) => {
                  if (done) {
                    const langStorage = this.getStorage(failedItem.item.lang);
                    langStorage.setItem(failedItem.item.block.rawHash, {
                      text: content,
                      provider: provider,
                      model: model,
                      id: id,
                      editedText: "",
                    });
                  }
                },
              );

              this.translatedInSession++;

              const langStat = this.languageStats.find(s => s.languageCode === failedItem.item.lang);
              if (langStat) {
                langStat.translated++;
                langStat.untranslated--;
                langStat.progress = Math.round((langStat.translated / langStat.total) * 100);
              }

              this.translatingItems = this.translatingItems.filter(
                (t) =>
                  t.articleName !== translatingItem.articleName ||
                  t.blockIndex !== translatingItem.blockIndex ||
                  t.lang !== translatingItem.lang,
              );
            } catch (error) {
              console.error("Retry failed:", error);
              this.translatingItems = this.translatingItems.filter(
                (t) =>
                  t.articleName !== translatingItem.articleName ||
                  t.blockIndex !== translatingItem.blockIndex ||
                  t.lang !== translatingItem.lang,
              );

              const newFailedItem = {
                ...failedItem,
                error: error.message || "重试失败",
              };
              this.failedItems = [...this.failedItems, newFailedItem];
            }
          },
          async retryAllFailed() {
            const itemsToRetry = [...this.failedItems];
            for (const failedItem of itemsToRetry) {
              await this.retryFailedItem(failedItem);
            }
          },
          async clearLanguageCache(lang) {
            const langStat = this.languageStats.find(s => s.languageCode === lang);
            if (!langStat) return;

            const confirmed = await confirm(
              `确定要清除 ${langStat.languageName} 的翻译缓存吗？\n\n这将删除 ${langStat.translated} 个已翻译的内容块缓存。`,
            );
            if (!confirmed) return;

            try {
              const langStorage = this.getStorage(lang);
              await langStorage.clear();
              langStat.translated = 0;
              langStat.untranslated = langStat.total;
              langStat.progress = 0;
              alert(`${langStat.languageName} 翻译缓存已清除！`);
            } catch (error) {
              console.error("Failed to clear cache:", error);
              alert("清除缓存失败: " + error.message);
            }
          },
          async clearAllCache() {
            const confirmed = await confirm(
              `确定要清除所有语言的翻译缓存吗？\n\n这将删除所有语言的翻译缓存数据。`,
            );
            if (!confirmed) return;

            try {
              for (const lang of this.targetLanguages) {
                const langStorage = this.getStorage(lang);
                await langStorage.clear();
              }
              for (const stat of this.languageStats) {
                stat.translated = 0;
                stat.untranslated = stat.total;
                stat.progress = 0;
              }
              alert("所有翻译缓存已清除！");
            } catch (error) {
              console.error("Failed to clear all cache:", error);
              alert("清除缓存失败: " + error.message);
            }
          },
          async generateAllFiles() {
            this.isGenerating = true;
            this.generatedCount = 0;
            this.generatedFiles = [];
            this.generatingStep = "准备生成文件...";

            try {
              if (!this._rootHandle) {
                this._rootHandle = await get(this.projectPath);
              }

              const totalFiles = this.allArticles.length * this.targetLanguages.length;
              this.totalToGenerate = totalFiles;

              for (const lang of this.targetLanguages) {
                const langName = LANGUAGES[lang] || lang;
                const langStorage = this.getStorage(lang);

                const targetLangHandle = await this._rootHandle.get(lang, {
                  create: "dir",
                });

                for (const article of this.allArticles) {
                  this.generatingStep = `生成 ${article.name} (${langName})`;

                  try {
                    await this.generateSingleFile(article, targetLangHandle, langStorage, lang, langName);
                    this.generatedFiles = [...this.generatedFiles, {
                      name: article.name,
                      lang,
                      langName,
                    }];
                  } catch (error) {
                    console.error(`Failed to generate ${article.name} for ${langName}:`, error);
                  }

                  this.generatedCount++;
                }
              }

              alert("翻译文档生成完成！");
            } catch (error) {
              console.error("Failed to generate files:", error);
              alert("生成文件失败: " + error.message);
            } finally {
              this.isGenerating = false;
              this.generatingStep = "";
            }
          },
          async generateSingleFile(article, targetLangHandle, langStorage, lang, langName) {
            const translatedBlocks = [];

            for (const block of article.blocks) {
              if (block.type === "space") {
                translatedBlocks.push(block.raw);
                continue;
              }

              const cachedData = await langStorage.getItem(block.rawHash);
              if (cachedData) {
                const text = typeof cachedData === "string"
                  ? cachedData
                  : cachedData.editedText || cachedData.text || "";
                translatedBlocks.push(text);
              } else {
                translatedBlocks.push(block.raw);
              }
            }

            let content;
            if (article.isTemp && article.blocks.length > 0) {
              content = translatedBlocks[0] || "";
            } else if (article.replaceContent) {
              const joinTranslatedBlocks = (blocks) => {
                return blocks.map(e => {
                  if (e.startsWith("#") || (e.startsWith("<") && e.endsWith(">"))) {
                    return e + "\n\n";
                  }
                  return e;
                }).join("");
              };
              content = article.replaceContent.replace("${temp}", joinTranslatedBlocks(translatedBlocks));
            } else {
              const joinTranslatedBlocks = (blocks) => {
                return blocks.map(e => {
                  if (e.startsWith("#") || (e.startsWith("<") && e.endsWith(">"))) {
                    return e + "\n\n";
                  }
                  return e;
                }).join("");
              };
              content = joinTranslatedBlocks(translatedBlocks);
            }

            const targetPath = article.path.split("/").slice(0, -1).join("/");
            if (targetPath) {
              const targetDirHandle = await targetLangHandle.get(targetPath, {
                create: "dir",
              });
              const fileHandle = await targetDirHandle.get(article.name, {
                create: "file",
              });
              await fileHandle.write(content);
            } else {
              const fileHandle = await targetLangHandle.get(article.name, {
                create: "file",
              });
              await fileHandle.write(content);
            }
          },
        },
        detached() {
          if (this.isTranslating) {
            this.stopTranslation();
          }
        },
      };
    };
  </script>
</template>
