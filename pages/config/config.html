<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/button/button.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/input/input.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/list/list.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/icon/icon.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/radio/group.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/radio/radio.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/dialog/dialog.html"></l-m>
  <style>
    :host {
      display: block;
    }

    .container {
      padding: 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    h2 {
      font-size: 18px;
      padding: 8px 0;
      margin: 0 0 16px 0;
      color: var(--md-ref-palette-normal40);
    }

    .form-item {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      color: var(--md-sys-color-normal);
      margin-bottom: 8px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .key-list {
      margin-top: 24px;
    }

    .provider-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
    }

    .provider-selector {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
    }

    p-list-item {
      &:hover {
        background: rgb(from var(--md-sys-color-on-primary) r g b / 0.4);
      }
    }
  </style>
  <div class="container">
    <h2>AI API Key 配置</h2>
    <div class="form-item">
      <label class="form-label">选择服务提供商</label>
      <div class="provider-selector">
        <p-radio-group sync:value="selectedProvider">
          <p-radio value="deepseek">DeepSeek</p-radio>
          <p-radio value="kimi">Kimi</p-radio>
          <p-radio value="glm">GLM</p-radio>
          <p-radio value="minimax">MiniMax</p-radio>
        </p-radio-group>
      </div>
    </div>
    <div class="form-item">
      <label class="form-label">API Key</label>
      <p-input sync:value="newKey" attr:placeholder="placeholder"></p-input>
    </div>
    <div class="toolbar">
      <p-button on:click="saveKey" attr:disabled="!newKey.trim()"
        >保存</p-button
      >
    </div>

    <div class="key-list">
      <h2>已保存的 API Keys</h2>
      <p-list>
        <o-fill :value="aiKeys" name="key-item"></o-fill>
      </p-list>
      <template name="key-item">
        <p-list-item>
          <span class="provider-tag" slot="prefix">{{$data.provider}}</span>
          <div>{{$data.key}}</div>
          <div secondary>并发: {{$data.concurrency || 1}}</div>

          <div slot="suffix" style="display: flex; gap: 8px">
            <p-button
              variant="text"
              on:click="$host.openEditDialog($data,$index)"
              size="small"
            >
              编辑
            </p-button>
            <p-button
              variant="outlined"
              on:click="$host.deleteKey($data,$index)"
              size="small"
            >
              删除
            </p-button>
          </div>
        </p-list-item>
      </template>
      <x-if :value="aiKeys.length === 0">
        <p-list-item>暂无保存的 API Keys</p-list-item>
      </x-if>
    </div>

    <p-dialog sync:open="editDialogOpen">
      <h2 slot="title">编辑 API Key</h2>
      <div>
        <div class="form-item">
          <label class="form-label">服务提供商</label>
          <p-input :value="editItem.provider" disabled></p-input>
        </div>
        <div class="form-item">
          <label class="form-label">API Key</label>
          <p-input :value="editItem.key" disabled></p-input>
        </div>
        <div class="form-item">
          <label class="form-label">并发次数</label>
          <p-input
            sync:value="editConcurrency"
            type="number"
            min="1"
            placeholder="请输入并发次数"
          ></p-input>
        </div>
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end">
        <p-button variant="outlined" on:click="closeEditDialog">取消</p-button>
        <p-button on:click="saveEdit">保存</p-button>
      </div>
    </p-dialog>
  </div>
  <script>
    export const parent = "../layout.html";

    import { storage } from "/gh/kirakiray/ever-cache/src/main.js";
    import { toast } from "/gh/ofajs/Punch-UI/packages/util.js";

    export default async ({ load, query }) => {
      return {
        data: {
          aiKeys: [], // 所有的 API Key
          _wid: null, // 监听器ID
          newKey: "",
          selectedProvider: "deepseek",
          editDialogOpen: false,
          editItem: {},
          editConcurrency: 1,
          editIndex: -1,
        },
        proto: {
          get placeholder() {
            return `请输入 ${this.selectedProvider} 的 API Key`;
          },
          async saveKey() {
            const existingKey = this.aiKeys.find(
              (item) =>
                item.provider === this.selectedProvider &&
                item.key === this.newKey,
            );

            if (existingKey) {
              toast({
                color: "error",
                message: "该 API Key 已存在",
              });
              return;
            }

            this.aiKeys.push({
              provider: this.selectedProvider,
              key: this.newKey,
              concurrency: 1,
            });

            this.newKey = "";
          },
          openEditDialog(item, index) {
            this.editItem = { ...item };
            this.editConcurrency = item.concurrency || 1;
            this.editIndex = index;
            this.editDialogOpen = true;
          },
          closeEditDialog() {
            this.editDialogOpen = false;
            this.editItem = {};
            this.editConcurrency = 1;
            this.editIndex = -1;
          },
          saveEdit() {
            if (!this.editConcurrency || this.editConcurrency < 1) {
              toast({
                color: "error",
                message: "并发次数必须大于 0",
              });
              return;
            }

            this.aiKeys[this.editIndex].concurrency = parseInt(
              this.editConcurrency,
            );

            this.closeEditDialog();
          },
          async deleteKey(keyItem, index) {
            this.aiKeys.splice(index, 1);
          },
        },
        async attached() {
          this.emit("set-active-id", {
            composed: true,
            data: {
              name: "config",
              query: { ...query },
            },
          });

          const aiKeys = (await storage.getItem("ai-keys")) || [];
          this.aiKeys = aiKeys;

          this._wid = this.aiKeys.watchTick(() => {
            const aiKeys = this.aiKeys.toJSON();
            storage.setItem("ai-keys", aiKeys);

            toast({
              color: "success",
              message: "API Key 更新成功",
            });
          });
        },
        detached() {
          this.aiKeys.unwatch(this._wid);
        },
      };
    };
  </script>
</template>
