  <init-project-dialog sync:open="showInitDialog" on:init-success="handleInitSuccess"></init-project-dialog>
  <script>
    export const parent = "./layout.html";

    export default async ({ load }) => {
      const { mount, save, get } = await load("/nos/fs/handle/mount/mount.js");
      const { getData } = await load("../util/yaml-handle.js");
      const { EverCache } = await load("/gh/kirakiray/ever-cache/src/main.js");
      const yaml = await load("/npm/js-yaml@4.1.1/dist/js-yaml.min.mjs");

      const storage = new EverCache("obook");

      return {
        data: {
          canUse: !!window.showDirectoryPicker,
          list: [],
          showConfirmDialog: false,
          showInitDialog: false,
          showDeleteDialog: false,
          deleteTarget: null,
          _currentHandle: null,
        },
        proto: {
          handleClick(item) {
            this.goto(`./dashboard/dashboard.html?path=${item._handle.path}`);
          },
          async selectDirectory() {
            const handle = await mount();

            await save(handle);

            const history = (await storage.getItem("history")) || [];

            if (!history.includes(handle.path)) {
              history.push(handle.path);
              await storage.setItem("history", history);
            }

            const isValid = await this.checkProjectStructure(handle);

            if (!isValid) {
              this._currentHandle = handle;
              this.showConfirmDialog = true;
              return;
            }

            this.goto(`./dashboard/dashboard.html?path=${handle.path}`);
          },
          async checkProjectStructure(handle) {
            try {
              const configHandle = await handle.get("_config.yaml");
              const configText = await configHandle.text();

              if (!configText || !configText.trim()) {
                return false;
              }

              const configData = yaml.load(configText);

              if (!configData || !configData.writingLang) {
                return false;
              }

              try {
                await handle.get(configData.writingLang);
              } catch {
                return false;
              }

              return true;
            } catch (error) {
              return false;
            }
          },
          openInitDialog() {
            this.showConfirmDialog = false;

            const dialog = this.shadow.$("init-project-dialog");
            if (dialog) {
              dialog._handle = this._currentHandle;
            }

            this.showInitDialog = true;
          },
          handleInitSuccess(event) {
            const handle = event.data.handle || this._currentHandle;

            debugger;

            if (handle) {
              this.goto(`./dashboard/dashboard.html?path=${handle.path}`);
            }
          },
          confirmDelete(item) {
            this.deleteTarget = item;
            this.showDeleteDialog = true;
          },
          async deleteHistoryItem() {
            if (!this.deleteTarget) return;

            const history = (await storage.getItem("history")) || [];
            const newPath = history.filter(
              (path) => path !== this.deleteTarget._handle.path,
            );
            await storage.setItem("history", newPath);

            this.list = this.list.filter(
              (item) => item._handle.path !== this.deleteTarget._handle.path,
            );

            this.showDeleteDialog = false;
            this.deleteTarget = null;
          },
          async loadHistory() {
            const history = (await storage.getItem("history")) || [];

            const list = [];

            // 读取目录后，获取数据
            for (const path of history) {
              const handle = await get(path);
              const data = await getData(handle).catch(() => {
                return {
                  name: "Unknown Project",
                };
              });

              list.push({
                ...data,
                _handle: handle,
              });
            }

            this.list = list;
          },
        },
        attached() {
          this.loadHistory();

          this.emit("set-active-id", {
            composed: true,
            data: {
              name: "start",
            },
          });
        },
      };
    };
  </script>
