  </style>

  <div class="layout">
    <div class="left">
      <div class="header">
        <h3>
          <locale-text>
            <span lang="cn">手动修改翻译</span>
            <span lang="en">Manual Translation Edit</span>
          </locale-text>
        </h3>
        <p>
          <locale-text>
            <span lang="cn">选择语言并编辑翻译内容</span>
            <span lang="en">Select language and edit translation content</span>
          </locale-text>
        </p>
      </div>

      <div class="search-box">
        <p-input
          sync:value="searchKeyword"
          attr:placeholder="searchPlaceholder"
          style="width: 100%"
        >
          <n-icon slot="prefix" icon="material-symbols:search"></n-icon>
        </p-input>
      </div>

      <h4
        style="
          margin: 16px 0 8px 0;
          font-size: 12px;
          color: var(--md-sys-color-on-surface-variant);
        "
      >
        <locale-text>
          <span lang="cn">文章列表 ({{filteredArticleList.length}})</span>
          <span lang="en">Article List ({{filteredArticleList.length}})</span>
        </locale-text>
      </h4>
      <p-list>
        <o-fill :value="filteredArticleList">
          <p-list-item
            button
            on:click="$host.clickItem($data)"
            attr:active-item="$host.activeArticlePath === $data.path"
          >
            <div class="file-item">
              <span class="file-name">{{$data.name}}</span>
              <span class="file-translated-count"
                >{{$data.translatedCount}}</span
              >
            </div>
          </p-list-item>
        </o-fill>
      </p-list>
    </div>

    <div class="article-content">
      <o-if :value="loading">
        <div class="loading">
          <locale-text>
            <span lang="cn">加载中...</span>
            <span lang="en">Loading...</span>
          </locale-text>
        </div>
      </o-if>
      <o-else-if :value="!loading && !activeArticlePath">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
          <div style="font-size: 18px; font-weight: 500; margin-bottom: 8px">
            <locale-text>
              <span lang="cn">选择一篇文章开始编辑</span>
              <span lang="en">Select an article to start editing</span>
            </locale-text>
          </div>
          <div style="font-size: 14px">
            <locale-text>
              <span lang="cn">从左侧列表选择要编辑的文章</span>
              <span lang="en">Select an article from the list on the left</span>
            </locale-text>
          </div>
        </div>
      </o-else-if>
      <o-else-if :value="!loading && currentBlocks.length === 0">
        <div class="empty-state">
          <div style="font-size: 18px; font-weight: 500; margin-bottom: 8px">
            <locale-text>
              <span lang="cn">暂无翻译数据</span>
              <span lang="en">No translation data</span>
            </locale-text>
          </div>
          <div style="font-size: 14px">
            <locale-text>
              <span lang="cn">该文章还没有翻译内容</span>
              <span lang="en">This article has no translation content yet</span>
            </locale-text>
          </div>
        </div>
      </o-else-if>
      <o-else>
        <div class="article-header">
          <div class="article-title">{{currentArticleName}}</div>
          <div class="article-lang">
            <p-select
              sync:value="targetLang"
              attr:placeholder="selectLangPlaceholder"
              style="width: 120px"
            >
              <o-fill :value="targetLanguages">
                <p-option attr:value="$data"
                  >{{$host.getLangWord($data)}}</p-option
                >
              </o-fill>
            </p-select>
          </div>
        </div>
        <o-fill :value="filteredCurrentBlocks">
          <translate-block
            :item="$data"
            :target-lang="$host.targetLang"
            :writing-lang="$host.config.writingLang"
            :project-path="$host.projectPath"
          ></translate-block>
        </o-fill>
      </o-else>
    </div>
  </div>

  <o-consumer name="project-data" watch:project-path="projectPath"></o-consumer>
  <script>
    import { LANGUAGES } from "./util/translate.js";
    import { getArticleData } from "./util/article-data.js";
    import { EverCache } from "/gh/kirakiray/ever-cache/src/main.js";
    import { getLocaleText } from "/nos/locale-text/get-locale-text.js";

    export default async ({ load }) => {
      const { get } = await load("/nos/fs/main.js");
      const { getData } = await load("../../util/yaml-handle.js");

      return {
        data: {
          projectPath: "",
          config: null,
          targetLang: "",
          targetLanguages: [],
          articleList: [],
          searchKeyword: "",
          activeArticlePath: "",
          currentBlocks: [],
          currentArticleName: "",
          loading: true,
          _originArticleData: null,
          _storages: {},
        },
        watch: {
          projectPath() {
            if (this.projectPath) {
              this.loadArticles();
            }
          },
          targetLang(newLang) {
            if (newLang && this.projectPath) {
              this.loadArticleBlocks();
            }
          },
        },
        proto: {
          get searchPlaceholder() {
            return getLocaleText({
              cn: "搜索文章内容...",
              en: "Search articles...",
            });
          },
          get selectLangPlaceholder() {
            return getLocaleText({
              cn: "选择语言",
              en: "Select language",
            });
          },
          getLangWord(lang) {
            return LANGUAGES[lang] || lang;
          },
          get filteredArticleList() {
            if (!this.searchKeyword || !this.searchKeyword.trim()) {
              return this.articleList;
            }
            const keyword = this.searchKeyword.toLowerCase().trim();
            return this.articleList.filter((article) => {
              if (!this._originArticleData) return false;
              const originArticle = this._originArticleData.find(
                (a) => a.path === article.path,
              );
              if (!originArticle || !originArticle.blocks) return false;
              return originArticle.blocks.some((block) => {
                if (!block.raw) return false;
                return block.raw.toLowerCase().includes(keyword);
              });
            });
          },
          get filteredCurrentBlocks() {
            if (!this.searchKeyword || !this.searchKeyword.trim()) {
              return this.currentBlocks;
            }
            const keyword = this.searchKeyword.toLowerCase().trim();
            return this.currentBlocks.filter((block) => {
              if (!block.raw) return false;
              return block.raw.toLowerCase().includes(keyword);
            });
          },
          getStorage(lang) {
            const key = "translates-" + lang + this.projectPath;
            if (!this._storages[key]) {
              this._storages[key] = new EverCache(key);
            }
            return this._storages[key];
          },
          async loadArticles() {
            this.loading = true;
            try {
              const handle = await get(this.projectPath);
              this.config = await getData(handle);
              const articleList = await getArticleData(
                await handle.get(this.config.writingLang),
                { isRoot: true },
              );

              if (!articleList || articleList.length === 0) {
                this.articleList = [];
                this._originArticleData = null;
                this.loading = false;
                return;
              }

              this._originArticleData = articleList;
              this.targetLanguages = this.config.languages.filter(
                (lang) => lang !== this.config.writingLang,
              );

              if (this.targetLanguages.length > 0) {
                this.targetLang = this.targetLanguages[0];
              }

              await this.updateArticleList();
            } catch (error) {
              console.error("Failed to load articles:", error);
              this.articleList = [];
              this._originArticleData = null;
            } finally {
              this.loading = false;
            }
          },
          async updateArticleList() {
            const articleListWithCount = [];

            for (const article of this._originArticleData) {
              if (!article.blocks || article.blocks.length === 0) continue;

              let translatedCount = 0;
              for (const block of article.blocks) {
                if (block.type === "space") continue;
                const storage = this.getStorage(this.targetLang);
                const cachedData = await storage.getItem(block.rawHash);
                if (cachedData) {
                  translatedCount++;
                }
              }

              articleListWithCount.push({
                ...article,
                translatedCount,
              });
            }

            this.articleList = articleListWithCount;

            if (this.activeArticlePath) {
              const article = articleListWithCount.find(
                (a) => a.path === this.activeArticlePath,
              );
              if (article) {
                this.clickItem(article);
              } else if (articleListWithCount.length > 0) {
                this.clickItem(articleListWithCount[0]);
              }
            } else if (articleListWithCount.length > 0) {
              this.clickItem(articleListWithCount[0]);
            }
          },
          async loadArticleBlocks() {
            if (!this.activeArticlePath) return;

            const article = this._originArticleData.find(
              (a) => a.path === this.activeArticlePath,
            );

            if (!article || !article.blocks) {
              this.currentBlocks = [];
              return;
            }

            const storage = this.getStorage(this.targetLang);
            const blocksWithTranslation = [];

            for (const block of article.blocks) {
              const cachedData = await storage.getItem(block.rawHash);
              blocksWithTranslation.push({
                ...block,
                translated: !!cachedData,
                translation: cachedData || null,
              });
            }

            this.currentBlocks = blocksWithTranslation;
          },
          setTargetLang(lang) {
            this.targetLang = lang;
          },
          clickItem(item) {
            this.activeArticlePath = item.path;
            this.currentArticleName = item.name;
            this.loadArticleBlocks();
          },
          goToNext() {
            this.emit("next-step", { composed: true });
          },
        },
        attached() {
          if (this.projectPath) {
            this.loadArticles();
          }
        },
      };
    };
  </script>
</template>
