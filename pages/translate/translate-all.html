<template page>
  <style>
    :host {
      display: block;
      height: 100%;
      padding: 16px;
    }
  </style>
  <link rel="stylesheet" href="./translate-all.css" />

  <div class="container">
    <o-if :value="loading">
      <div class="loading">
        <div>正在加载文章数据...</div>
      </div>
    </o-if>
    <o-else-if :value="!loading && allArticles.length === 0">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div>暂无文章数据</div>
      </div>
    </o-else-if>
    <o-else>
      <div class="status-card" class:compact="isTranslating">
        <div class="status-title">
          <o-if :value="isTranslating">翻译进度</o-if>
          <o-else>翻译状态</o-else>
        </div>
        <o-if :value="isCompleted">
          <div
            class="status-content"
            style="color: var(--md-sys-color-success)"
          >
            ✅ 全部翻译完成！
          </div>
        </o-if>
        <o-else-if :value="!isTranslating">
          <div class="status-content">
            <o-if :value="untranslatedCount > 0">
              还有 <strong>{{untranslatedCount}}</strong> 个内容块待翻译
            </o-if>
            <o-else> 正在检查翻译状态... </o-else>
          </div>
        </o-else-if>

        <div class="stats">
          <div class="stat-item">
            <div class="stat-number">{{totalBlocks}}</div>
            <div class="stat-label">总内容块</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" style="color: var(--md-sys-color-success)">
              {{translatedCount}}
            </div>
            <div class="stat-label">已翻译</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" style="color: var(--md-sys-color-normal)">
              {{untranslatedCount}}
            </div>
            <div class="stat-label">待翻译</div>
          </div>
          <o-if :value="failedItems.length > 0">
            <div class="stat-item">
              <div class="stat-number" style="color: var(--md-sys-color-error)">
                {{failedItems.length}}
              </div>
              <div class="stat-label">失败</div>
            </div>
          </o-if>
        </div>

        <o-if :value="isTranslating">
          <div class="progress-bar">
            <div
              class="progress-fill"
              :style.width="progressPercent + '%'"
            ></div>
          </div>
          <div class="status-content" style="text-align: center">
            翻译进度: {{translatedInSession}} / {{totalToTranslate}}
          </div>
        </o-if>

        <div class="button-container">
          <o-if :value="!isTranslating && untranslatedCount > 0">
            <p-button variant="contained" on:click="startTranslation">
              开始翻译 ({{untranslatedCount}})
            </p-button>
          </o-if>
          <o-if :value="isTranslating">
            <p-button variant="outlined" on:click="stopTranslation">
              停止翻译
            </p-button>
          </o-if>
          <o-if :value="!isTranslating && isCompleted">
            <p-button variant="outlined" on:click="refreshStatus">
              刷新状态
            </p-button>
          </o-if>
        </div>
      </div>

      <o-if :value="translatingItems.length > 0 || completedItems.length > 0">
        <div class="status-card">
          <div class="status-title">
            翻译详情
            <o-if :value="completedItems.length > 0">
              <span
                style="
                  font-size: 12px;
                  color: var(--md-sys-color-on-surface-variant);
                  margin-left: 8px;
                "
              >
                (已完成 {{completedItems.length}} 项)
              </span>
            </o-if>
          </div>
          <o-fill :value="translatingItems">
            <div class="translation-item translating">
              <div class="translation-item-header">
                <div>
                  <div class="article-name">{{$data.articleName}}</div>
                  <div class="block-info">块 #{{$data.blockIndex + 1}}</div>
                </div>
                <div class="status-badge translating">
                  <o-if :value="$data.isThinking">思考中</o-if>
                  <o-else>翻译中</o-else>
                </div>
              </div>
              <div class="translation-content">{{$data.preview}}</div>
              <o-if :value="$data.streamContent">
                <div class="stream-content" class:thinking="$data.isThinking">
                  {{$data.streamContent}}
                </div>
              </o-if>
            </div>
          </o-fill>
          <o-fill :value="displayedCompletedItems">
            <o-if :value="$host.hasMoreCompletedItems && $index === 0">
              <div
                style="
                  text-align: center;
                  padding: 8px;
                  color: var(--md-sys-color-on-surface-variant);
                  font-size: 12px;
                "
              >
                ... 已隐藏 {{$host.hiddenCompletedCount}} 个已完成的翻译 ...
              </div>
            </o-if>
            <div class="translation-item completed">
              <div class="translation-item-header">
                <div>
                  <div class="article-name">{{$data.articleName}}</div>
                  <div class="block-info">块 #{{$data.blockIndex + 1}}</div>
                </div>
                <div class="status-badge completed">已完成</div>
              </div>
              <div class="translation-content">{{$data.preview}}</div>
            </div>
          </o-fill>
        </div>
      </o-if>

      <o-if :value="failedItems.length > 0">
        <div class="status-card">
          <div class="status-title" style="color: var(--md-sys-color-error)">
            翻译失败 ({{failedItems.length}})
          </div>
          <o-fill :value="failedItems">
            <div
              class="translation-item"
              style="border-left-color: var(--md-sys-color-error)"
            >
              <div class="translation-item-header">
                <div>
                  <div class="article-name">{{$data.articleName}}</div>
                  <div class="block-info">块 #{{$data.blockIndex + 1}}</div>
                </div>
                <div
                  class="status-badge"
                  style="
                    background-color: var(--md-sys-color-error);
                    color: var(--md-sys-color-on-error);
                  "
                >
                  失败
                </div>
              </div>
              <div class="translation-content">{{$data.preview}}</div>
              <div
                style="
                  margin-top: 8px;
                  font-size: 12px;
                  color: var(--md-sys-color-error);
                "
              >
                错误: {{$data.error}}
              </div>
              <div style="margin-top: 8px; display: flex; gap: 8px">
                <p-button
                  size="small"
                  variant="outlined"
                  on:click="$host.retryFailedItem($data)"
                >
                  重试
                </p-button>
              </div>
            </div>
          </o-fill>
          <div style="margin-top: 12px; text-align: center">
            <p-button variant="outlined" on:click="retryAllFailed">
              重试全部失败项
            </p-button>
          </div>
        </div>
      </o-if>
    </o-else>
  </div>

  <o-consumer name="project-data" watch:project-path="projectPath"></o-consumer>
  <script>
    import { marked } from "/npm/marked@17.0.1/lib/marked.esm.js";
    import { getArticleData } from "./util/article-data.js";
    import { translate } from "./util/translate.js";
    import { EverCache, storage } from "/gh/kirakiray/ever-cache/src/main.js";
    import { getStatus } from "/nos/ai/chat.js";

    export default async ({ load }) => {
      const { get } = await load("/nos/fs/main.js");
      const { getData } = await load("../../util/yaml-handle.js");

      return {
        data: {
          projectPath: "", // 项目路径，从 project-data consumer 获取
          targetLang: "en", // 翻译目标语言，默认为英语
          loading: true, // 是否正在加载文章数据
          allArticles: [], // 所有文章数据列表
          totalBlocks: 0, // 总内容块数量（包括已翻译和未翻译）
          translatedCount: 0, // 已翻译的内容块数量
          untranslatedCount: 0, // 待翻译的内容块数量
          isCompleted: false, // 是否全部翻译完成
          isTranslating: false, // 是否正在进行批量翻译
          shouldStop: false, // 是否应该停止翻译（用于中断翻译过程）
          translatingItems: [], // 当前正在翻译的块列表
          completedItems: [], // 本次翻译会话中已完成的块列表
          failedItems: [], // 翻译失败的块列表
          translatedInSession: 0, // 本次翻译会话中已完成的数量
          totalToTranslate: 0, // 本次翻译会话需要翻译的总数量
          _storage: null, // 翻译缓存存储对象（EverCache 实例）
        },
        watch: {
          projectPath() {
            if (this.projectPath) {
              this._storage = getStorage(this.targetLang + this.projectPath);
              this.loadArticles();
            }
          },
        },
        proto: {
          get progressPercent() {
            if (this.totalToTranslate === 0) return 0;
            return Math.round(
              (this.translatedInSession / this.totalToTranslate) * 100,
            );
          },
          get displayedCompletedItems() {
            if (this.completedItems.length > 20) {
              return this.completedItems.slice(-10);
            }
            return this.completedItems;
          },
          get hasMoreCompletedItems() {
            return this.completedItems.length > 20;
          },
          get hiddenCompletedCount() {
            return this.completedItems.length - 10;
          },
          async loadArticles() {
            try {
              this.loading = true;
              const handle = await get(this.projectPath);
              this.config = await getData(handle);
              const articleList = await getArticleData(
                await handle.get(this.config.writingLang),
                { isRoot: true },
              );

              if (!articleList || articleList.length === 0) {
                this.allArticles = [];
                this.loading = false;
                return;
              }

              this.allArticles = articleList;
              await this.checkTranslationStatus();
            } catch (error) {
              console.error("Failed to load articles:", error);
              this.allArticles = [];
            } finally {
              this.loading = false;
            }
          },
          async checkTranslationStatus() {
            let total = 0;
            let translated = 0;

            for (const article of this.allArticles) {
              if (article.isTemp && article.blocks && article.blocks.length > 0) {
                total++;
                const cachedData = await this._storage.getItem(
                  article.blocks[0].rawHash,
                );
                if (cachedData) {
                  translated++;
                }
              } else if (article.blocks && article.blocks.length > 0) {
                for (const block of article.blocks) {
                  if (block.type === "space") continue;
                  total++;
                  const cachedData = await this._storage.getItem(block.rawHash);
                  if (cachedData) {
                    translated++;
                  }
                }
              }
            }

            this.totalBlocks = total;
            this.translatedCount = translated;
            this.untranslatedCount = total - translated;
            this.isCompleted = this.untranslatedCount === 0 && total > 0;
          },
          async startTranslation() {
            this.isTranslating = true;
            this.shouldStop = false;
            this.translatingItems = [];
            this.completedItems = [];
            this.failedItems = [];
            this.translatedInSession = 0;

            const untranslatedBlocks = [];

            for (const article of this.allArticles) {
              if (article.isTemp && article.blocks && article.blocks.length > 0) {
                const cachedData = await this._storage.getItem(
                  article.blocks[0].rawHash,
                );
                if (!cachedData) {
                  untranslatedBlocks.push({
                    article,
                    block: article.blocks[0],
                    blockIndex: 0,
                  });
                }
              } else if (article.blocks && article.blocks.length > 0) {
                for (let i = 0; i < article.blocks.length; i++) {
                  const block = article.blocks[i];
                  if (block.type === "space") continue;
                  const cachedData = await this._storage.getItem(block.rawHash);
                  if (!cachedData) {
                    untranslatedBlocks.push({
                      article,
                      block,
                      blockIndex: i,
                    });
                  }
                }
              }
            }

            this.totalToTranslate = untranslatedBlocks.length;

            const keys = (await storage.getItem("ai-keys")) || [];
            let concurrencyLimit = 3;
            if (keys.length > 0) {
              const totalConcurrency = keys.reduce((sum, key) => {
                return sum + (key.concurrency || 1);
              }, 0);
              concurrencyLimit = Math.max(3, totalConcurrency);
            }

            const executingTasks = new Set();

            const translateBlock = async (item, retryCount = 0) => {
              if (this.shouldStop) {
                return { stopped: true };
              }

              const translatingItem = {
                articleName: item.article.name,
                blockIndex: item.blockIndex,
                preview: this.getPreview(item.block.raw),
                retryCount: retryCount,
                streamContent: "",
                isThinking: false,
              };

              this.translatingItems = [
                ...this.translatingItems,
                translatingItem,
              ];

              try {
                await translate(
                  item.block.raw,
                  this.targetLang,
                  ({ provider, id, model, content, done, isThinking }) => {
                    if (this.shouldStop) {
                      return;
                    }

                    const index = this.translatingItems.findIndex(
                      (t) =>
                        t.articleName === translatingItem.articleName &&
                        t.blockIndex === translatingItem.blockIndex,
                    );
                    if (index !== -1) {
                      this.translatingItems[index].streamContent = content;
                      this.translatingItems[index].isThinking = isThinking;
                    }

                    if (done) {
                      this._storage.setItem(item.block.rawHash, {
                        text: content,
                        provider: provider,
                        model: model,
                        id: id,
                        editedText: "",
                      });
                    }
                  },
                );

                if (this.shouldStop) {
                  this.translatingItems = this.translatingItems.filter(
                    (t) =>
                      t.articleName !== translatingItem.articleName ||
                      t.blockIndex !== translatingItem.blockIndex,
                  );
                  return { stopped: true };
                }

                this.translatedInSession++;
                this.translatedCount++;
                this.untranslatedCount--;

                this.translatingItems = this.translatingItems.filter(
                  (t) =>
                    t.articleName !== translatingItem.articleName ||
                    t.blockIndex !== translatingItem.blockIndex,
                );
                this.completedItems = [...this.completedItems, translatingItem];
                return { stopped: false };
              } catch (error) {
                console.error("Translation failed:", error);
                this.translatingItems = this.translatingItems.filter(
                  (t) =>
                    t.articleName !== translatingItem.articleName ||
                    t.blockIndex !== translatingItem.blockIndex,
                );

                const failedItem = {
                  ...translatingItem,
                  error: error.message || "翻译失败",
                  item: item,
                };
                this.failedItems = [...this.failedItems, failedItem];
                return { stopped: false };
              }
            };

            for (const item of untranslatedBlocks) {
              if (this.shouldStop) {
                break;
              }

              const task = translateBlock(item)
                .then((result) => {
                  if (result?.stopped) {
                    executingTasks.delete(task);
                  }
                  return result;
                })
                .finally(() => {
                  executingTasks.delete(task);
                });

              executingTasks.add(task);

              if (executingTasks.size >= concurrencyLimit) {
                await Promise.race(executingTasks);
              }
            }

            if (executingTasks.size > 0 && !this.shouldStop) {
              await Promise.all(executingTasks);
            }

            this.isTranslating = false;
            this.isCompleted = this.untranslatedCount === 0 && !this.shouldStop;
          },
          stopTranslation() {
            this.shouldStop = true;
            this.translatingItems = [];
            this.isTranslating = false;
          },
          async retryFailedItem(failedItem) {
            this.failedItems = this.failedItems.filter(
              (item) =>
                item.articleName !== failedItem.articleName ||
                item.blockIndex !== failedItem.blockIndex,
            );

            const translatingItem = {
              articleName: failedItem.articleName,
              blockIndex: failedItem.blockIndex,
              preview: failedItem.preview,
              retryCount: (failedItem.retryCount || 0) + 1,
            };

            this.translatingItems = [...this.translatingItems, translatingItem];

            try {
              await translate(
                failedItem.item.block.raw,
                this.targetLang,
                ({ provider, id, model, content, done }) => {
                  if (done) {
                    this._storage.setItem(failedItem.item.block.rawHash, {
                      text: content,
                      provider: provider,
                      model: model,
                      id: id,
                      editedText: "",
                    });
                  }
                },
              );

              this.translatedInSession++;
              this.translatedCount++;
              this.untranslatedCount--;

              this.translatingItems = this.translatingItems.filter(
                (t) =>
                  t.articleName !== translatingItem.articleName ||
                  t.blockIndex !== translatingItem.blockIndex,
              );
              this.completedItems = [...this.completedItems, translatingItem];
              this.isCompleted = this.untranslatedCount === 0;
            } catch (error) {
              console.error("Retry failed:", error);
              this.translatingItems = this.translatingItems.filter(
                (t) =>
                  t.articleName !== translatingItem.articleName ||
                  t.blockIndex !== translatingItem.blockIndex,
              );

              const newFailedItem = {
                ...failedItem,
                error: error.message || "重试失败",
                retryCount: translatingItem.retryCount,
              };
              this.failedItems = [...this.failedItems, newFailedItem];
            }
          },
          async retryAllFailed() {
            const itemsToRetry = [...this.failedItems];
            for (const failedItem of itemsToRetry) {
              await this.retryFailedItem(failedItem);
            }
          },
          refreshStatus() {
            this.loadArticles();
          },
          getPreview(text) {
            if (!text) return "";
            const preview = text.trim().substring(0, 100);
            return preview.length < text.trim().length
              ? preview + "..."
              : preview;
          },
        },
      };
    };

    const storages = {};
    const getStorage = (projectPath) => {
      const key = "translates-" + projectPath;
      if (storages[key]) {
        return storages[key];
      }
      const storage = (storages[key] = new EverCache(key));
      return storage;
    };
  </script>
</template>
