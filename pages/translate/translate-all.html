<template page>
  <style>
    :host {
      display: block;
      height: 100%;
      padding: 16px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .status-card {
      padding: 24px;
      border-radius: 12px;
      background-color: var(--md-sys-color-surface);
      margin-bottom: 16px;
    }

    .status-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 12px;
      color: var(--md-sys-color-on-surface);
    }

    .status-content {
      font-size: 14px;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 16px;
    }

    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 600;
      color: var(--md-sys-color-primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      background-color: var(--md-sys-color-primary);
      transition: width 0.3s ease;
    }

    .button-container {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .translation-item {
      padding: 16px;
      border-radius: 8px;
      background-color: var(--md-sys-color-surface);
      margin-bottom: 12px;
      border-left: 4px solid var(--md-sys-color-primary);
    }

    .translation-item.completed {
      border-left-color: var(--md-sys-color-success);
    }

    .translation-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .article-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface);
    }

    .block-info {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .translation-content {
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
      margin-top: 8px;
      padding: 8px;
      background-color: var(--md-sys-color-surface-container);
      border-radius: 4px;
      max-height: 100px;
      overflow: auto;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-badge.translating {
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .status-badge.completed {
      background-color: var(--md-sys-color-success);
      color: var(--md-sys-color-on-success);
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .loading {
      text-align: center;
      padding: 48px 24px;
      color: var(--md-sys-color-on-surface-variant);
    }
  </style>
  <div class="container">
    <o-if :value="loading">
      <div class="loading">
        <div>正在加载文章数据...</div>
      </div>
    </o-if>
    <o-else-if :value="!loading && allArticles.length === 0">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div>暂无文章数据</div>
      </div>
    </o-else-if>
    <o-else>
      <div class="status-card">
        <div class="status-title">翻译状态</div>
        <o-if :value="isCompleted">
          <div
            class="status-content"
            style="color: var(--md-sys-color-success)"
          >
            ✅ 全部翻译完成！
          </div>
        </o-if>
        <o-else>
          <div class="status-content">
            <o-if :value="untranslatedCount > 0">
              还有 <strong>{{untranslatedCount}}</strong> 个内容块待翻译
            </o-if>
            <o-else> 正在检查翻译状态... </o-else>
          </div>
        </o-else>

        <div class="stats">
          <div class="stat-item">
            <div class="stat-number">{{totalBlocks}}</div>
            <div class="stat-label">总内容块</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" style="color: var(--md-sys-color-success)">
              {{translatedCount}}
            </div>
            <div class="stat-label">已翻译</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" style="color: var(--md-sys-color-normal)">
              {{untranslatedCount}}
            </div>
            <div class="stat-label">待翻译</div>
          </div>
        </div>

        <o-if :value="isTranslating">
          <div class="progress-bar">
            <div
              class="progress-fill"
              :style.width="progressPercent + '%'"
            ></div>
          </div>
          <div class="status-content" style="text-align: center">
            翻译进度: {{translatedInSession}} / {{totalToTranslate}}
          </div>
        </o-if>

        <div class="button-container">
          <o-if :value="!isTranslating && untranslatedCount > 0">
            <p-button variant="contained" on:click="startTranslation">
              开始翻译 ({{untranslatedCount}})
            </p-button>
          </o-if>
          <o-if :value="isTranslating">
            <p-button variant="outlined" on:click="stopTranslation">
              停止翻译
            </p-button>
          </o-if>
          <o-if :value="!isTranslating && isCompleted">
            <p-button variant="outlined" on:click="refreshStatus">
              刷新状态
            </p-button>
          </o-if>
        </div>
      </div>

      <o-if :value="translatingItems.length > 0 || completedItems.length > 0">
        <div class="status-card">
          <div class="status-title">翻译详情</div>
          <o-fill :value="translatingItems">
            <div class="translation-item">
              <div class="translation-item-header">
                <div>
                  <div class="article-name">{{$data.articleName}}</div>
                  <div class="block-info">块 #{{$data.blockIndex + 1}}</div>
                </div>
                <div class="status-badge translating">翻译中</div>
              </div>
              <div class="translation-content">{{$data.preview}}</div>
            </div>
          </o-fill>
          <o-fill :value="completedItems">
            <div class="translation-item completed">
              <div class="translation-item-header">
                <div>
                  <div class="article-name">{{$data.articleName}}</div>
                  <div class="block-info">块 #{{$data.blockIndex + 1}}</div>
                </div>
                <div class="status-badge completed">已完成</div>
              </div>
              <div class="translation-content">{{$data.preview}}</div>
            </div>
          </o-fill>
        </div>
      </o-if>
    </o-else>
  </div>

  <o-consumer name="project-data" watch:project-path="projectPath"></o-consumer>
  <script>
    import { marked } from "/npm/marked@17.0.1/lib/marked.esm.js";
    import { getArticleData } from "./util/article-data.js";
    import { translate } from "./util/translate.js";
    import { EverCache } from "/gh/kirakiray/ever-cache/src/main.js";

    export default async ({ load }) => {
      const { get } = await load("/nos/fs/main.js");
      const { getData } = await load("../../util/yaml-handle.js");

      return {
        data: {
          projectPath: "", // 项目路径，从 project-data consumer 获取
          targetLang: "en", // 翻译目标语言，默认为英语
          loading: true, // 是否正在加载文章数据
          allArticles: [], // 所有文章数据列表
          totalBlocks: 0, // 总内容块数量（包括已翻译和未翻译）
          translatedCount: 0, // 已翻译的内容块数量
          untranslatedCount: 0, // 待翻译的内容块数量
          isCompleted: false, // 是否全部翻译完成
          isTranslating: false, // 是否正在进行批量翻译
          shouldStop: false, // 是否应该停止翻译（用于中断翻译过程）
          translatingItems: [], // 当前正在翻译的块列表
          completedItems: [], // 本次翻译会话中已完成的块列表
          translatedInSession: 0, // 本次翻译会话中已完成的数量
          totalToTranslate: 0, // 本次翻译会话需要翻译的总数量
          _storage: null, // 翻译缓存存储对象（EverCache 实例）
        },
        watch: {
          projectPath() {
            if (this.projectPath) {
              this._storage = getStorage(this.targetLang + this.projectPath);
              this.loadArticles();
            }
          },
        },
        proto: {
          get progressPercent() {
            if (this.totalToTranslate === 0) return 0;
            return Math.round(
              (this.translatedInSession / this.totalToTranslate) * 100,
            );
          },
          async loadArticles() {
            try {
              this.loading = true;
              const handle = await get(this.projectPath);
              this.config = await getData(handle);
              const articleList = await getArticleData(
                await handle.get(this.config.writingLang),
                { isRoot: true },
              );

              if (!articleList || articleList.length === 0) {
                this.allArticles = [];
                this.loading = false;
                return;
              }

              this.allArticles = articleList;
              await this.checkTranslationStatus();
            } catch (error) {
              console.error("Failed to load articles:", error);
              this.allArticles = [];
            } finally {
              this.loading = false;
            }
          },
          async checkTranslationStatus() {
            let total = 0;
            let translated = 0;

            for (const article of this.allArticles) {
              if (article.isTemp) {
                total++;
                const cachedData = await this._storage.getItem(
                  article.contentHash,
                );
                if (cachedData) {
                  translated++;
                }
              } else if (article.blocks && article.blocks.length > 0) {
                for (const block of article.blocks) {
                  if (block.type === "space") continue;
                  total++;
                  const cachedData = await this._storage.getItem(block.rawHash);
                  if (cachedData) {
                    translated++;
                  }
                }
              }
            }

            this.totalBlocks = total;
            this.translatedCount = translated;
            this.untranslatedCount = total - translated;
            this.isCompleted = this.untranslatedCount === 0 && total > 0;
          },
          async startTranslation() {
            this.isTranslating = true;
            this.shouldStop = false;
            this.translatingItems = [];
            this.completedItems = [];
            this.translatedInSession = 0;

            const untranslatedBlocks = [];

            for (const article of this.allArticles) {
              if (article.isTemp) {
                const cachedData = await this._storage.getItem(
                  article.contentHash,
                );
                if (!cachedData) {
                  untranslatedBlocks.push({
                    article,
                    block: {
                      raw: article.content,
                      rawHash: article.contentHash,
                    },
                    blockIndex: 0,
                  });
                }
              } else if (article.blocks && article.blocks.length > 0) {
                for (let i = 0; i < article.blocks.length; i++) {
                  const block = article.blocks[i];
                  if (block.type === "space") continue;
                  const cachedData = await this._storage.getItem(block.rawHash);
                  if (!cachedData) {
                    untranslatedBlocks.push({
                      article,
                      block,
                      blockIndex: i,
                    });
                  }
                }
              }
            }

            this.totalToTranslate = untranslatedBlocks.length;

            for (const item of untranslatedBlocks) {
              if (this.shouldStop) {
                break;
              }

              const translatingItem = {
                articleName: item.article.name,
                blockIndex: item.blockIndex,
                preview: this.getPreview(item.block.raw),
              };

              this.translatingItems = [translatingItem];

              try {
                await translate(
                  item.block.raw,
                  this.targetLang,
                  ({ provider, id, model, content, done }) => {
                    if (done) {
                      this._storage.setItem(item.block.rawHash, {
                        text: content,
                        provider: provider,
                        model: model,
                        id: id,
                        editedText: "",
                      });
                    }
                  },
                );

                this.translatedInSession++;
                this.translatedCount++;
                this.untranslatedCount--;

                this.translatingItems = [];
                this.completedItems = [...this.completedItems, translatingItem];
              } catch (error) {
                console.error("Translation failed:", error);
                this.translatingItems = [];
              }

              await new Promise((resolve) => setTimeout(resolve, 500));
            }

            this.isTranslating = false;
            this.isCompleted = this.untranslatedCount === 0;
          },
          stopTranslation() {
            this.shouldStop = true;
          },
          refreshStatus() {
            this.loadArticles();
          },
          getPreview(text) {
            if (!text) return "";
            const preview = text.trim().substring(0, 100);
            return preview.length < text.trim().length
              ? preview + "..."
              : preview;
          },
        },
      };
    };

    const storages = {};
    const getStorage = (projectPath) => {
      const key = "translates-" + projectPath;
      if (storages[key]) {
        return storages[key];
      }
      const storage = (storages[key] = new EverCache(key));
      return storage;
    };
  </script>
</template>
