<template component>
  <l-m src="/gh/ofajs/Punch-UI/packages/button/button.html"></l-m>
  <style>
    :host {
      display: block;
      margin: 16px 0;
    }
    .container {
      display: flex;
      gap: 16px;
    }
    .left,
    .right {
      flex: 1;
      flex-shrink: 0;
      border-radius: 8px;
      line-height: 1.6;
      font-size: 14px;
    }
    .left {
      padding: 16px;
      background-color: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-primary);
      border-left-width: 4px;
      color: var(--md-sys-color-on-surface);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .right {
      position: relative;
      background-color: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-success);
      border-left-width: 4px;
      color: var(--md-sys-color-on-surface);
    }
    .right .editable {
      box-sizing: border-box;
      padding: 16px;
      width: 100%;
      min-height: 100%;
      border: none;
      color: var(--md-sys-color-on-surface);
      background-color: transparent;
      outline: none;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .right .editable[contenteditable="false"] {
      opacity: 0.6;
      pointer-events: none;
    }
    .right .editable:empty:before {
      content: attr(data-placeholder);
      color: var(--md-sys-color-on-surface);
      opacity: 0.5;
    }
    .right .editable.thinking {
      opacity: 0.7;
      font-style: italic;
    }
    .provider-tag {
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 4px;
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      font-weight: 500;
      text-transform: uppercase;
      align-self: center;
    }
    .model-tag {
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 4px;
      background-color: var(--md-sys-color-success);
      color: var(--md-sys-color-on-success);
      font-weight: 500;
      align-self: center;
    }
    .id-tag {
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 4px;
      background-color: var(--md-sys-color-normal);
      color: var(--md-sys-color-on-normal);
      font-weight: 500;
      align-self: center;
    }
  </style>
  <div class="container">
    <div class="left">{{item.raw}}</div>
    <div class="right">
      <div
        class="editable"
        attr:contenteditable="!translating"
        :text="translateText"
        data-placeholder="未翻译"
        on:input="handleInput"
        class:thinking="thinking"
      ></div>
    </div>
  </div>
  <div
    style="
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
      gap: 8px;
      align-items: center;
    "
  >
    <div
      class="id-tag"
      :style.display="!!id ? 'block' : 'none'"
      :text="id"
    ></div>
    <div
      class="model-tag"
      :style.display="!!model ? 'block' : 'none'"
      :text="model"
    ></div>
    <div
      class="provider-tag"
      :style.display="!!provider ? 'block' : 'none'"
      :text="provider"
    ></div>
    <p-button
      size="small"
      variant="outlined"
      on:click="translate"
      attr:disabled="translating"
    >
      <o-if :value="thinking"> 思考中... </o-if>
      <o-else-if :value="translating"> 翻译中... </o-else-if>
      <o-else-if :value="translateText">重新翻译</o-else-if>
      <o-else> 翻译 </o-else>
    </p-button>
  </div>

  <o-consumer name="project-data" watch:project-path="projectPath"></o-consumer>
  <script>
    import { EverCache } from "/gh/kirakiray/ever-cache/src/main.js";
    import { translate } from "./translate.js";

    export default async function ({ load }) {
      return {
        tag: "translate-block",
        data: {
          translateText: "", // 翻译后的文本
          translating: false, // 是否正在翻译
          thinking: false, // 是否正在思考
          item: null,
          targetLang: "", // 翻译到目标语言
          projectPath: "",
          provider: "", // 翻译提供商
          model: "", // 翻译模型
          id: "", // API Key ID
        },
        watch: {
          item() {
            if (!this.item) {
              return;
            }

            this.init();
          },
          thinking() {
            const editable = this.shadow.$(".editable");
            if (editable) {
              if (this.thinking) {
                editable.classList.add("thinking");
              } else {
                editable.classList.remove("thinking");
              }
            }
          },
        },
        proto: {
          // 翻译原文
          async translate() {
            if (!this.item || !this.item.raw) {
              return;
            }

            this.translating = true;
            this.translateText = "";
            this.provider = "";
            this.model = "";
            this.id = "";
            this.thinking = false;

            try {
              const storage = getStorage(this.targetLang + this.projectPath);

              await translate(
                this.item.raw,
                this.targetLang,
                ({ provider, id, model, chunk, content, done, isThinking }) => {
                  this.translateText = content;
                  this.provider = provider;
                  this.model = model;
                  this.id = id;
                  this.thinking = isThinking;

                  if (done) {
                    storage.setItem(this.cacheKey, {
                      text: content,
                      provider: provider,
                      model: model,
                      id: id,
                    });
                  }
                },
              );
            } catch (error) {
              console.error("Translation failed:", error);
              this.translateText = "翻译失败: " + error.message;
              this.provider = "";
              this.model = "";
              this.id = "";
              this.thinking = false;
            } finally {
              this.translating = false;
              this.thinking = false;
            }
          },
          get cacheKey() {
            return this.item.rawHash;
          },
          handleInput(e) {
            this.translateText = e.target.innerText.trim();
          },
          async init() {
            if (this.item.type === "space") {
              this.style.display = "none";
              return;
            }

            const storage = getStorage(this.targetLang + this.projectPath);

            const cachedData = await storage.getItem(this.cacheKey);
            if (cachedData) {
              if (typeof cachedData === "string") {
                this.translateText = cachedData;
                this.provider = "";
                this.model = "";
                this.id = "";
              } else {
                this.translateText = cachedData.text || "";
                this.provider = cachedData.provider || "";
                this.model = cachedData.model || "";
                this.id = cachedData.id || "";
              }
            }
          },
        },
      };
    }

    const storages = {};
    // 获取翻译的存储空间
    const getStorage = (projectPath) => {
      const key = "translates-" + projectPath;
      if (storages[key]) {
        return storages[key];
      }
      const storage = (storages[key] = new EverCache(key));
      return storage;
    };
  </script>
</template>
