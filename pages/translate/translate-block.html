<template component>
  <style>
    :host {
      display: block;
      margin: 16px 0;
    }
    .container {
      display: flex;
      gap: 16px;
    }
    .left,
    .right {
      flex: 1;
      flex-shrink: 0;
      border-radius: 8px;
      line-height: 1.6;
      font-size: 14px;
    }
    .left {
      padding: 16px;
      background-color: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-primary);
      border-left-width: 4px;
      color: var(--md-sys-color-on-surface);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .right {
      position: relative;
      background-color: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-success);
      border-left-width: 4px;
      color: var(--md-sys-color-on-surface);
    }
    .right textarea {
      box-sizing: border-box;
      padding: 16px;
      width: 100%;
      height: 100%;
      border: none;
      resize: none;
      color: var(--md-sys-color-on-surface);
      background-color: transparent;
    }
  </style>
  <div class="container">
    <div class="left">{{item.raw}}</div>
    <div class="right">
      <textarea sync:value="translateText" attr:disabled="translating">
      </textarea>
    </div>
  </div>
  <div style="display: flex; justify-content: flex-end; margin-top: 4px">
    <p-button
      size="small"
      variant="outlined"
      on:click="translate"
      attr:disabled="translating"
    >
      翻译
    </p-button>
  </div>

  <o-consumer name="project-data" watch:project-path="projectPath"></o-consumer>
  <script>
    import { EverCache } from "/gh/kirakiray/ever-cache/src/main.js";
    import { translate } from "./translate.js";

    export default async function ({ load }) {
      return {
        tag: "translate-block",
        data: {
          translateText: "", // 翻译后的文本
          translating: false, // 是否正在翻译
          item: null,
          targetLang: "", // 翻译到目标语言
          projectPath: "",
        },
        watch: {
          item() {
            if (!this.item) {
              return;
            }

            this.init();
          },
        },
        proto: {
          // 翻译原文
          async translate() {
            if (!this.item || !this.item.raw) {
              return;
            }

            this.translating = true;
            this.translateText = "";

            try {
              const storage = getStorage(this.targetLang + this.projectPath);

              await translate(
                this.item.raw,
                this.targetLang,
                ({ content, fullContent, done }) => {
                  this.translateText = fullContent;

                  if (done) {
                    storage.setItem(this.cacheKey, fullContent);
                  }
                },
              );
            } catch (error) {
              console.error("Translation failed:", error);
              this.translateText = "翻译失败: " + error.message;
            } finally {
              this.translating = false;
            }
          },
          get cacheKey() {
            return this.item.rawHash;
          },
          async init() {
            if (this.item.type === "space") {
              this.style.display = "none";
              return;
            }

            const storage = getStorage(this.targetLang + this.projectPath);

            const cachedTranslation = await storage.getItem(this.cacheKey);
            if (cachedTranslation) {
              this.translateText = cachedTranslation;
            }
          },
        },
      };
    }

    const storages = {};
    // 获取翻译的存储空间
    const getStorage = (projectPath) => {
      const key = "translates-" + projectPath;
      if (storages[key]) {
        return storages[key];
      }
      const storage = (storages[key] = new EverCache(key));
      return storage;
    };
  </script>
</template>
