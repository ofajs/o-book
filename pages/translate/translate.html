<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/list/list.html"></l-m>
  <style>
    :host {
      display: block;
    }
    .container {
      padding: 16px;
    }
  </style>
  <div class="container">
    <div>写作语言: <span>{{config.writingLang}}</span></div>
    <p>{{config}}</p>
    <p-list style="max-height: 60vh; width: 300px; overflow: auto">
      <o-fill :value="articleData">
        <p-list-item
          button
          on:click="$host.clickItem($data)"
          attr:active-item="$host.activeArticlePath === $data.path"
        >
          {{$data.name}}
        </p-list-item>
      </o-fill>
    </p-list>
  </div>
  <script>
    export const parent = "../layout.html";

    import { marked } from "/npm/marked@17.0.1/lib/marked.esm.js";
    import { getArticleData } from "./article-data.js";
    import { transformArticle } from "./transform.js";

    export default async ({ load, query }) => {
      const { get } = await load("/nos/fs/main.js");
      const { getData } = await load("../../util/yaml-handle.js");

      return {
        data: {
          activeId: "AI",
          config: {
            writingLang: "cn",
            languages: ["cn", "en"],
          },
          articleData: [],
          activeArticlePath: "",
          _originArticleData: null,
        },
        proto: {
          clickItem(item) {
            this.activeArticlePath = item.path;
          },
          async loadArticle() {
            try {
              const handle = await get(query.path);
              this.config = await getData(handle);
              const articleData = await getArticleData(
                await handle.get(this.config.writingLang),
                { isRoot: true },
              );

              if (!articleData || articleData.length === 0) {
                console.warn("No articles found");
                this.articleData = [];
                this._originArticleData = null;
                return;
              }

              this._originArticleData = articleData;
              this.activeArticlePath = articleData[0].path;
              this.articleData = articleData.map(transformArticle);
            } catch (error) {
              console.error("Failed to load article:", error);
              this.articleData = [];
              this._originArticleData = null;
            }
          },
        },
        attached() {
          this.loadArticle();
          this.emit("set-active-id", {
            composed: true,
            data: {
              name: "translate",
              query: { ...query },
            },
          });
        },
      };
    };
  </script>
</template>
